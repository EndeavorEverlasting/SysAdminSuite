name: Agent instruction contracts

permissions:
  contents: write

on:
  push:
    branches: [main, 'feat/**', 'repair/**', 'refactor/**', 'docs/**', 'harness/**']
    paths:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'CODEBASE_MAP.md'
      - '.claude/skills/**'
      - '.claude/capabilities/**'
      - 'docs/AI_LAYER.md'
      - 'docs/AI_HARNESS_ENTRYPOINT.md'
      - 'docs/END_TO_END_TESTING_POSTURE.md'
      - 'harness/api/agent-capability-manifest.json'
      - 'harness/api/agent-routing-manifest.json'
      - 'harness/api/sas-harness-api.json'
      - 'harness/api/developer-workstation-agent-routing.json'
      - 'harness/workflows/agent-sprint-capsule.yaml'
      - 'harness/e2e/**'
      - 'schemas/harness/agent-capability-manifest.schema.json'
      - 'schemas/harness/agent-routing-manifest.schema.json'
      - 'schemas/harness/agent-sprint-capsule.schema.json'
      - 'schemas/harness/developer-workstation-agent-routing.schema.json'
      - 'schemas/harness/e2e-validation-profiles.schema.json'
      - 'Tests/Fixtures/capsules/**'
      - 'Tests/Pester/SprintCapsule.Tests.ps1'
      - 'Tests/survey/test_agent_instruction_factoring_contracts.py'
      - 'Tests/survey/test_agent_capability_manifest_contracts.py'
      - 'Tests/survey/test_agent_routing_manifest_contracts.py'
      - 'Tests/survey/test_agent_sprint_capsule_contracts.py'
      - 'Tests/survey/test_developer_workstation_agent_harness_contracts.py'
      - 'Tests/survey/test_e2e_default_posture_contracts.py'
      - 'tools/New-SasSprintCapsule.ps1'
      - 'tools/validate-ai-layer.ps1'
      - 'tools/Test-Pester5Suite.ps1'
      - 'scripts/SasRunContext.psm1'
      - 'tests/survey/run_offline_survey_tests.sh'
      - '.github/workflows/agent-instruction-contracts.yml'
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'CODEBASE_MAP.md'
      - '.claude/skills/**'
      - '.claude/capabilities/**'
      - 'docs/AI_LAYER.md'
      - 'docs/AI_HARNESS_ENTRYPOINT.md'
      - 'docs/END_TO_END_TESTING_POSTURE.md'
      - 'harness/api/agent-capability-manifest.json'
      - 'harness/api/agent-routing-manifest.json'
      - 'harness/api/sas-harness-api.json'
      - 'harness/api/developer-workstation-agent-routing.json'
      - 'harness/workflows/agent-sprint-capsule.yaml'
      - 'harness/e2e/**'
      - 'schemas/harness/agent-capability-manifest.schema.json'
      - 'schemas/harness/agent-routing-manifest.schema.json'
      - 'schemas/harness/agent-sprint-capsule.schema.json'
      - 'schemas/harness/developer-workstation-agent-routing.schema.json'
      - 'schemas/harness/e2e-validation-profiles.schema.json'
      - 'Tests/Fixtures/capsules/**'
      - 'Tests/Pester/SprintCapsule.Tests.ps1'
      - 'Tests/survey/test_agent_instruction_factoring_contracts.py'
      - 'Tests/survey/test_agent_capability_manifest_contracts.py'
      - 'Tests/survey/test_agent_routing_manifest_contracts.py'
      - 'Tests/survey/test_agent_sprint_capsule_contracts.py'
      - 'Tests/survey/test_developer_workstation_agent_harness_contracts.py'
      - 'Tests/survey/test_e2e_default_posture_contracts.py'
      - 'tools/New-SasSprintCapsule.ps1'
      - 'tools/validate-ai-layer.ps1'
      - 'tools/Test-Pester5Suite.ps1'
      - 'scripts/SasRunContext.psm1'
      - 'tests/survey/run_offline_survey_tests.sh'
      - '.github/workflows/agent-instruction-contracts.yml'

jobs:
  factoring-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install contract dependencies
        run: python -m pip install jsonschema pyyaml
      - name: Compile agent harness contracts
        run: >-
          python -m py_compile
          Tests/survey/test_agent_instruction_factoring_contracts.py
          Tests/survey/test_agent_capability_manifest_contracts.py
          Tests/survey/test_agent_routing_manifest_contracts.py
          Tests/survey/test_agent_sprint_capsule_contracts.py
      - name: Skill, capability, routing, and handoff contracts
        run: |
          python3 Tests/survey/test_agent_instruction_factoring_contracts.py
          python3 Tests/survey/test_agent_capability_manifest_contracts.py
          python3 Tests/survey/test_agent_routing_manifest_contracts.py
          python3 Tests/survey/test_agent_sprint_capsule_contracts.py
          python3 Tests/survey/test_developer_workstation_agent_harness_contracts.py
          python3 Tests/survey/test_e2e_default_posture_contracts.py
      - name: Parse harness workflow spec
        run: >-
          python -c "import pathlib,yaml; p=pathlib.Path('harness/workflows/agent-sprint-capsule.yaml'); d=yaml.safe_load(p.read_text()); assert d['mode']=='local_transform' and d['network_activity'] is False and d['target_mutation'] is False; print('PASS: agent sprint capsule workflow')"

  ai-layer-validator:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: AI layer validator
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .\tools\validate-ai-layer.ps1
      - name: Sprint capsule Pester contracts
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .\tools\Test-Pester5Suite.ps1 -TestPath .\Tests\Pester\SprintCapsule.Tests.ps1

  register-p64:
    if: github.event_name == 'pull_request' && github.head_ref == 'docs/prompt-registry-agent-skill-extractor'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate synchronized P64 registry surfaces
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/temp-register-p64.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          Path('/tmp/register_p64.py').write_text(
              textwrap.dedent(source[start:end]) + '\n',
              encoding='utf-8',
          )
          PY
          python /tmp/register_p64.py
      - name: Remove one-shot scaffolding and restore read-only CI
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/agent-instruction-contracts.yml')
          text = workflow.read_text(encoding='utf-8')
          marker = '\n  register-p64:\n'
          if marker not in text:
              raise SystemExit('temporary register-p64 job marker missing')
          text = text.split(marker, 1)[0].rstrip() + '\n'
          text = text.replace('permissions:\n  contents: write', 'permissions:\n  contents: read', 1)
          workflow.write_text(text, encoding='utf-8')

          for temporary in (
              '.github/workflows/temp-register-p64-pr.yml',
              '.github/temp-p64-trigger.txt',
          ):
              Path(temporary).unlink(missing_ok=True)
          PY
      - name: Validate generated registry and instruction contracts
        shell: bash
        run: |
          python -m py_compile \
            Tests/survey/test_prompt_registry_contracts.py \
            Tests/survey/test_agent_instruction_factoring_contracts.py \
            Tests/survey/test_e2e_default_posture_contracts.py
          python Tests/survey/test_prompt_registry_contracts.py
          python Tests/survey/test_agent_instruction_factoring_contracts.py
          python Tests/survey/test_agent_capability_manifest_contracts.py
          python Tests/survey/test_agent_routing_manifest_contracts.py
          python Tests/survey/test_agent_sprint_capsule_contracts.py
          python Tests/survey/test_developer_workstation_agent_harness_contracts.py
          python Tests/survey/test_e2e_default_posture_contracts.py
          git diff --check
          git status --short
          git diff --stat
          git diff --name-only
      - name: Commit synchronized prompt registry
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs(prompts): register agent instruction skill extractor'
          git push origin HEAD:docs/prompt-registry-agent-skill-extractor
