name: One-shot AutoLogon password gate repair

on:
  push:
    branches:
      - feat/2026-07-13-autologon-state-delta
    paths:
      - '.github/workflows/patch-autologon-password-gate.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/2026-07-13-autologon-state-delta
          fetch-depth: 0

      - name: Apply fail-closed password-presence gate
        shell: python
        run: |
          from pathlib import Path

          script_path = Path('scripts/Invoke-SasAutoLogonStateDelta.ps1')
          text = script_path.read_text(encoding='utf-8')

          old_function = """    function Get-AutoLogonStatus {
                  param([string]$ExpectedName, [object]$IntentValue, [object]$EnabledValue, [object]$UserValue)
                  $expected = $ExpectedName.ToUpperInvariant()
                  $actual = ConvertTo-AccountLeaf -Value ([string]$UserValue)
                  $enabled = ([string]$EnabledValue).Trim() -in @('1', '0x1')
                  $intent = (\"$IntentValue\").ToUpperInvariant().Replace('_', '').Replace(' ', '').Contains('AUTOLOGONYES')

                  if ($enabled -and $actual -eq $expected) { return 'autologon_ready' }
                  if ($enabled -and $actual -ne $expected) { return 'configured_user_mismatch' }
                  if ($intent) { return 'intent_only' }
                  return 'not_configured'
              }
          """
          new_function = """    function Get-AutoLogonStatus {
                  param(
                      [string]$ExpectedName,
                      [object]$IntentValue,
                      [object]$EnabledValue,
                      [object]$UserValue,
                      [bool]$PasswordPresent
                  )
                  $expected = $ExpectedName.ToUpperInvariant()
                  $actual = ConvertTo-AccountLeaf -Value ([string]$UserValue)
                  $enabled = ([string]$EnabledValue).Trim() -in @('1', '0x1')
                  $intent = (\"$IntentValue\").ToUpperInvariant().Replace('_', '').Replace(' ', '').Contains('AUTOLOGONYES')

                  if ($enabled -and $actual -ne $expected) { return 'configured_user_mismatch' }
                  if ($enabled -and $actual -eq $expected -and -not $PasswordPresent) { return 'configured_password_missing' }
                  if ($enabled -and $actual -eq $expected -and $PasswordPresent) { return 'autologon_ready' }
                  if ($intent) { return 'intent_only' }
                  return 'not_configured'
              }
          """
          if text.count(old_function) != 1:
              raise SystemExit('Expected exactly one legacy Get-AutoLogonStatus function block.')
          text = text.replace(old_function, new_function)

          old_call = "status = Get-AutoLogonStatus -ExpectedName $env:COMPUTERNAME -IntentValue $intentValue -EnabledValue $enabledValue -UserValue $userValue"
          new_call = "status = Get-AutoLogonStatus -ExpectedName $env:COMPUTERNAME -IntentValue $intentValue -EnabledValue $enabledValue -UserValue $userValue -PasswordPresent ([bool]$passwordPresent)"
          if text.count(old_call) != 1:
              raise SystemExit('Expected exactly one legacy Get-AutoLogonStatus call.')
          text = text.replace(old_call, new_call)
          script_path.write_text(text, encoding='utf-8', newline='\n')

          test_path = Path('Tests/survey/test_autologon_state_delta_contracts.py')
          tests = test_path.read_text(encoding='utf-8')
          marker = "\ndef test_installed_software_inventory_avoids_product_class_queries() -> None:\n"
          addition = """

def test_autologon_ready_requires_default_password_presence() -> None:
    content = read(PS_SCRIPT)
    required = (
        "[bool]$PasswordPresent",
        "configured_password_missing",
        "$enabled -and $actual -eq $expected -and -not $PasswordPresent",
        "$enabled -and $actual -eq $expected -and $PasswordPresent",
        "-PasswordPresent ([bool]$passwordPresent)",
    )
    for fragment in required:
        assert fragment in content, f"missing fail-closed password-presence gate: {fragment}"

"""
          if marker not in tests:
              raise SystemExit('Unable to find insertion marker for password-presence contract.')
          tests = tests.replace(marker, addition + marker, 1)

          list_marker = "        test_default_password_data_is_never_read_or_exported,\n        test_installed_software_inventory_avoids_product_class_queries,"
          list_replacement = "        test_default_password_data_is_never_read_or_exported,\n        test_autologon_ready_requires_default_password_presence,\n        test_installed_software_inventory_avoids_product_class_queries,"
          if tests.count(list_marker) != 1:
              raise SystemExit('Unable to wire password-presence contract into test runner.')
          tests = tests.replace(list_marker, list_replacement)
          test_path.write_text(tests, encoding='utf-8', newline='\n')

          doc_path = Path('docs/AUTOLOGON_STATE_DELTA.md')
          docs = doc_path.read_text(encoding='utf-8')
          doc_marker = "Do not add password data, secret values, deployment credentials, or account passwords to snapshot,\ndelta, CSV, JSON, screenshot, or handoff artifacts."
          doc_replacement = "The classifier reports `autologon_ready` only when `AutoAdminLogon` is enabled, the configured user matches the expected hostname-based account, and the `DefaultPassword` value name is present. An enabled matching account without that value is reported as `configured_password_missing`; the value data remains unread.\n\n" + doc_marker
          if docs.count(doc_marker) != 1:
              raise SystemExit('Unable to find credential-boundary documentation marker.')
          docs = docs.replace(doc_marker, doc_replacement)
          doc_path.write_text(docs, encoding='utf-8', newline='\n')

      - name: Validate repaired branch
        shell: bash
        run: |
          set -euo pipefail
          python Tests/survey/test_autologon_state_delta_contracts.py
          git diff --check

      - name: Commit repair and remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/patch-autologon-password-gate.yml
          git add scripts/Invoke-SasAutoLogonStateDelta.ps1 \
            Tests/survey/test_autologon_state_delta_contracts.py \
            docs/AUTOLOGON_STATE_DELTA.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(autologon): require password presence for ready state'
          git push origin HEAD:feat/2026-07-13-autologon-state-delta
