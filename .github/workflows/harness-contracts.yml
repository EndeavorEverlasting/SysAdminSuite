name: Harness Contracts

on:
  pull_request:
    paths:
      - '.github/workflows/harness-contracts.yml'
      - 'Tests/bash/run_harness_contracts.sh'
      - 'Tests/bash/test_english_log_artifact_contracts.sh'
      - 'Tests/bash/test_sysadmin_harness_validator_contracts.sh'
      - 'Tests/survey/test_one_command_harness_proof_contracts.py'
      - 'Tests/survey/test_software_deployment_transport_contracts.py'
      - 'Tests/survey/test_software_deployment_transport_preflight_contracts.py'
      - 'Tests/survey/test_software_deployment_transport_live_cert_contracts.py'
      - 'Tests/survey/test_canonical_smb_task_deployment_contracts.py'
      - 'Tests/survey/test_deployment_transport_convergence_contracts.py'
      - 'Tests/survey/test_software_install_finalization_contracts.py'
      - 'Tests/Pester/SoftwareDeploymentTransport.Tests.ps1'
      - 'Tests/Pester/SoftwareDeploymentTransportLiveCert.Tests.ps1'
      - 'Tests/Pester/SmbScheduledTaskDeployment.Tests.ps1'
      - 'Tests/Pester/ValidatedSoftwareDeploymentRequest.Tests.ps1'
      - 'Tests/Fixtures/software-deployment-transport/**'
      - 'Tests/Fixtures/software-deployment-transport-live-cert/**'
      - 'Tests/Fixtures/smb-scheduled-task-deployment/**'
      - 'Tests/bash/test_harness_command_surface.sh'
      - 'Tests/bash/test_pr142_scope_boundary_contracts.sh'
      - 'Tests/bash/test_smb_scheduled_task_install_contracts.sh'
      - 'Run-HarnessContracts.cmd'
      - 'Run-HarnessValidation.cmd'
      - 'Run-EnglishReportFixture.cmd'
      - 'Run-ExportHarnessEvidence.cmd'
      - 'Config/low-noise-policy.json'
      - 'docs/handoff/pr142-scope-ledger.md'
      - 'scripts/Ensure-Pr142HarnessFoundationWorktree.ps1'
      - 'scripts/Invoke-SasHarnessContracts.ps1'
      - 'scripts/run-harness-validation.sh'
      - 'scripts/render-english-report-fixtures.sh'
      - 'scripts/show-harness-evidence-paths.sh'
      - 'scripts/Render-SasEnglishReport.ps1'
      - 'scripts/validate-sysadmin-harness.ps1'
      - 'scripts/SasRunContext.psm1'
      - 'scripts/SasLowNoisePolicy.psm1'
      - 'scripts/SasSoftwareDeploymentTransport.psm1'
      - 'scripts/SasSoftwareDeploymentLowNoise.psm1'
      - 'scripts/SasSoftwareDeploymentAdapter.psm1'
      - 'scripts/SasSoftwareDeploymentLiveCert.psm1'
      - 'scripts/SasSoftwareInstallFinalization.psm1'
      - 'scripts/Test-SasSoftwareDeploymentTransport.ps1'
      - 'scripts/Invoke-SasSoftwareDeploymentTransportLiveCert.ps1'
      - 'scripts/Invoke-SasValidatedSoftwareDeployment.ps1'
      - 'scripts/Test-SasSmbScheduledTaskDeploymentFixture.ps1'
      - 'bash/apps/sas-install-apps.sh'
      - 'schemas/harness/**'
      - 'harness/api/sas-harness-api.json'
      - 'harness/workflows/software-deployment-transport.yaml'
      - 'docs/SOFTWARE_DEPLOYMENT_TRANSPORT_CONTRACT.md'
      - 'docs/SOFTWARE_DEPLOYMENT_LOW_NOISE.md'
      - 'docs/SMB_SCHEDULED_TASK_SOFTWARE_INSTALL.md'
      - 'docs/handoff/deployment-transport-convergence.md'
      - 'docs/launch-and-doc-index.md'
      - 'survey/fixtures/english-log/**'
      - 'survey/workflows/**'
  push:
    branches:
      - main
      - docs/ai-layer-harness-tooling-plan
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harness-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Software deployment transport contracts
        shell: bash
        run: python3 Tests/survey/test_software_deployment_transport_contracts.py

      - name: Deployment transport convergence contracts
        shell: bash
        run: python3 Tests/survey/test_deployment_transport_convergence_contracts.py

      - name: Software deployment low-noise and preflight contracts
        shell: bash
        run: python3 Tests/survey/test_software_deployment_transport_preflight_contracts.py

      - name: Harmless software deployment transport live-cert contracts
        shell: bash
        run: python3 Tests/survey/test_software_deployment_transport_live_cert_contracts.py

      - name: Canonical SMB scheduled-task deployment contracts
        shell: bash
        run: python3 Tests/survey/test_canonical_smb_task_deployment_contracts.py

      - name: Run harness contract suite
        shell: bash
        run: bash Tests/bash/run_harness_contracts.sh

  transport-preflight-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Parse PowerShell 5.1 entrypoint and modules
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $null = [scriptblock]::Create((Get-Content .\scripts\SasSoftwareDeploymentTransport.psm1 -Raw))
          $null = [scriptblock]::Create((Get-Content .\scripts\SasSoftwareDeploymentLowNoise.psm1 -Raw))
          $null = [scriptblock]::Create((Get-Content .\scripts\SasLowNoisePolicy.psm1 -Raw))
          $null = [scriptblock]::Create((Get-Content .\scripts\Test-SasSoftwareDeploymentTransport.ps1 -Raw))
          $null = [scriptblock]::Create((Get-Content .\scripts\SasSoftwareDeploymentAdapter.psm1 -Raw))
          $null = [scriptblock]::Create((Get-Content .\scripts\SasSoftwareDeploymentLiveCert.psm1 -Raw))
          $null = [scriptblock]::Create((Get-Content .\scripts\SasSoftwareInstallFinalization.psm1 -Raw))
          $null = [scriptblock]::Create((Get-Content .\scripts\Invoke-SasValidatedSoftwareDeployment.ps1 -Raw))
          $null = [scriptblock]::Create((Get-Content .\scripts\Test-SasSmbScheduledTaskDeploymentFixture.ps1 -Raw))
          $null = [scriptblock]::Create((Get-Content .\scripts\Invoke-SasSoftwareDeploymentTransportLiveCert.ps1 -Raw))
          'PARSE OK'

      - name: Install Pester 5
        shell: powershell
        run: Install-Module Pester -MinimumVersion 5.0 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run focused transport preflight Pester
        shell: powershell
        run: |
          $result = Invoke-Pester -Path .\Tests\Pester\SoftwareDeploymentTransport.Tests.ps1 -PassThru
          if ($result.FailedCount -gt 0) { throw "$($result.FailedCount) focused Pester test(s) failed." }

      - name: Run validated software finalization Pester on Windows PowerShell 5.1
        shell: powershell
        run: |
          $result = Invoke-Pester -Path .\Tests\Pester\ValidatedSoftwareDeploymentRequest.Tests.ps1 -PassThru
          if ($result.FailedCount -gt 0) { throw "$($result.FailedCount) validated finalization Pester test(s) failed." }

      - name: Run focused canonical SMB scheduled-task Pester
        shell: powershell
        run: |
          $result = Invoke-Pester -Path .\Tests\Pester\SmbScheduledTaskDeployment.Tests.ps1 -PassThru
          if ($result.FailedCount -gt 0) { throw "$($result.FailedCount) canonical SMB scheduled-task Pester test(s) failed." }

      - name: Run focused harmless transport live-cert Pester
        shell: powershell
        run: |
          $result = Invoke-Pester -Path .\Tests\Pester\SoftwareDeploymentTransportLiveCert.Tests.ps1 -PassThru
          if ($result.FailedCount -gt 0) { throw "$($result.FailedCount) harmless transport live-cert Pester test(s) failed." }

      - name: Execute offline SMB-ready fixture
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $execution = .\scripts\Test-SasSoftwareDeploymentTransport.ps1 `
            -FixtureMode `
            -FixturePath .\Tests\Fixtures\software-deployment-transport\kerberos-smb-task-ready.fixture.json `
            -OutputRoot .\survey\output\transport-preflight-ci `
            -PassThru
          if ($execution.result.network_activity_performed) { throw 'Fixture claimed network activity.' }
          if ($execution.result.target_mutation_performed) { throw 'Fixture claimed target mutation.' }
          if ($execution.result.decision.classification -ne 'kerberos_smb_task_ready') { throw 'Unexpected fixture classification.' }
          if (-not (Test-Path -LiteralPath $execution.low_noise_context_path -PathType Leaf)) { throw 'Low-noise context was not generated.' }
          $registry = Get-Content -LiteralPath $execution.artifact_registry_path -Raw | ConvertFrom-Json
          if (@($registry.artifacts).Count -ne 4) { throw 'Expected four registered fixture artifacts.' }

      - name: Validate generated fixture result against P01 schema
        shell: pwsh
        run: |
          python -m pip install jsonschema
          $resultPath = Get-ChildItem .\survey\output\transport-preflight-ci -Filter software_deployment_transport_result.json -File -Recurse | Select-Object -First 1 -ExpandProperty FullName
          python -c "import json,jsonschema,sys; jsonschema.validate(json.load(open(sys.argv[1],encoding='utf-8-sig')),json.load(open(sys.argv[2],encoding='utf-8-sig'))); print('SCHEMA VALID')" $resultPath .\schemas\harness\software-deployment-transport-result.schema.json

      - name: Execute and schema-validate harmless live-cert fixture
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $execution = .\scripts\Invoke-SasSoftwareDeploymentTransportLiveCert.ps1 `
            -FixtureMode `
            -FixtureScenario success `
            -PreflightResultPath .\Tests\Fixtures\software-deployment-transport\kerberos-smb-task-ready.fixture.json `
            -OutputRoot .\survey\output\transport-live-cert-ci `
            -PassThru
          if ($execution.disposition -ne 'CONTRACT FIXTURE ONLY') { throw 'Fixture was promoted beyond contract proof.' }
          if ($execution.result.network_activity_performed) { throw 'Fixture claimed network activity.' }
          if ($execution.result.target_mutation_performed) { throw 'Fixture claimed target mutation.' }
          python -c "import json,jsonschema,sys; jsonschema.validate(json.load(open(sys.argv[1],encoding='utf-8-sig')),json.load(open(sys.argv[2],encoding='utf-8-sig'))); print('SCHEMA VALID')" $execution.result_path .\schemas\harness\software-deployment-transport-live-cert-result.schema.json
          if ($LASTEXITCODE -ne 0) { throw 'Live-cert fixture schema validation failed.' }

      - name: Execute and schema-validate canonical SMB task fixture matrix
        shell: powershell
        run: |
          .\scripts\Test-SasSmbScheduledTaskDeploymentFixture.ps1 -OutputRoot .\survey\output\canonical-smb-task-ci
          $schema = '.\schemas\harness\smb-scheduled-task-deployment-result.schema.json'
          Get-ChildItem .\survey\output\canonical-smb-task-ci\results -Filter *.result.json | ForEach-Object {
            python -c "import json,jsonschema,sys; jsonschema.validate(json.load(open(sys.argv[1],encoding='utf-8-sig')),json.load(open(sys.argv[2],encoding='utf-8-sig'))); print('SCHEMA VALID',sys.argv[1])" $_.FullName $schema
            if ($LASTEXITCODE -ne 0) { throw "Schema validation failed: $($_.FullName)" }
          }

      - name: Upload sanitized fixture proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: software-deployment-transport-preflight-fixture
          path: |
            survey/output/transport-preflight-ci
            survey/output/transport-live-cert-ci
          if-no-files-found: error
