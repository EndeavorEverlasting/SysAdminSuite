name: Repair agent harness review findings

permissions:
  contents: write

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/repair_agent_harness_review.py'
      - '.github/workflows/repair-agent-harness-review.yml'

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Normalize repair contract rewrite
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tools/repair_agent_harness_review.py')
          text = path.read_text(encoding='utf-8')
          start = text.index("    replace_once(\n        path,\n        '''    for bad in")
          end = text.index('\n\n    path = "Tests/survey/test_agent_routing_manifest_contracts.py"', start)
          replacement = r'''    target = ROOT / path
              source = target.read_text(encoding="utf-8")
              function_start = source.index("def test_schema_rejects_local_paths_when_jsonschema_is_available() -> None:\n")
              function_end = source.index("\n\ndef main() -> None:", function_start)
              replacement_function = '''def test_schema_rejects_local_paths_when_jsonschema_is_available() -> None:
              try:
                  import jsonschema
              except ImportError:
                  return
              schema, fixture = load(SCHEMA), load(FIXTURE)
              jsonschema.validate(fixture, schema)
              for bad in (r"C:\\Users\\operator\\repo", "/home/operator/repo", "/mnt/c/Users/operator/repo", "/workspace/SysAdminSuite", "/tmp/sas-run", "token=abc", "password: abc", "secret = abc"):
                  candidate = copy.deepcopy(fixture)
                  candidate["handoff"]["next_command"] = bad
                  try:
                      jsonschema.validate(candidate, schema)
                  except jsonschema.ValidationError:
                      pass
                  else:
                      raise AssertionError(f"schema accepted machine-local or secret-like handoff text: {bad}")
              candidate = copy.deepcopy(fixture)
              candidate["scope"]["owned_paths"][0] = r"safe\..\outside"
              try:
                  jsonschema.validate(candidate, schema)
              except jsonschema.ValidationError:
                  pass
              else:
                  raise AssertionError("schema accepted a backslash parent-traversal repository path")
              '''
              target.write_text(source[:function_start] + replacement_function + source[function_end:], encoding="utf-8")'''
          path.write_text(text[:start] + replacement + text[end:], encoding='utf-8')
          PY
      - name: Apply reviewed repairs
        shell: bash
        run: |
          set -o pipefail
          python tools/repair_agent_harness_review.py 2>&1 | tee "$RUNNER_TEMP/agent-harness-repair.log"
      - name: Validate repair
        run: |
          python -m pip install jsonschema pyyaml
          python -m py_compile \
            Tests/survey/test_agent_instruction_factoring_contracts.py \
            Tests/survey/test_agent_capability_manifest_contracts.py \
            Tests/survey/test_agent_routing_manifest_contracts.py \
            Tests/survey/test_agent_sprint_capsule_contracts.py
          python Tests/survey/test_agent_instruction_factoring_contracts.py
          python Tests/survey/test_agent_capability_manifest_contracts.py
          python Tests/survey/test_agent_routing_manifest_contracts.py
          python Tests/survey/test_agent_sprint_capsule_contracts.py
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml
          for path in (
              'schemas/harness/agent-sprint-capsule.schema.json',
              'harness/api/agent-routing-manifest.json',
              'harness/api/sas-harness-api.json',
          ):
              json.loads(Path(path).read_text())
          workflow = yaml.safe_load(Path('harness/workflows/agent-sprint-capsule.yaml').read_text())
          assert workflow['input_mapping']['next_command'] == 'NextCommand'
          print('PASS: repair schema and workflow parse')
          PY
          git diff --check
      - name: Upload repair diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-harness-repair-diagnostics
          path: ${{ runner.temp }}/agent-harness-repair.log
          if-no-files-found: error
          retention-days: 3
      - name: Commit repaired harness
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm tools/repair_agent_harness_review.py .github/workflows/repair-agent-harness-review.yml
          git add \
            AGENTS.md \
            docs/AI_HARNESS_ENTRYPOINT.md \
            harness/api/agent-routing-manifest.json \
            harness/api/sas-harness-api.json \
            harness/workflows/agent-sprint-capsule.yaml \
            schemas/harness/agent-sprint-capsule.schema.json \
            tools/New-SasSprintCapsule.ps1 \
            Tests/Pester/SprintCapsule.Tests.ps1 \
            Tests/survey/test_agent_routing_manifest_contracts.py \
            Tests/survey/test_agent_sprint_capsule_contracts.py \
            .github/workflows/agent-instruction-contracts.yml
          git commit -m 'fix(harness): close capsule review boundaries'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
