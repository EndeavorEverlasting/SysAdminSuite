name: Patch AutoLogon Handoff Launcher

on:
  push:
    branches:
      - feat/2026-07-13-autologon-state-delta
    paths:
      - '.github/workflows/patch-autologon-handoff-launcher.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/2026-07-13-autologon-state-delta
          fetch-depth: 0
          show-progress: false

      - name: Replace memorized command with technician launcher
        shell: pwsh
        run: |
          $path = '.\scripts\Invoke-SasAutoLogonStateDelta.ps1'
          $content = Get-Content -LiteralPath $path -Raw
          $old = @'
              $handoff += 'After approved auto-logon work completes, run:'
              $handoff += ".\scripts\Invoke-SasAutoLogonStateDelta.ps1 -Mode After -RunId $RunId -TargetsCsv <same-approved-manifest>"
          '@
          $new = @'
              $handoff += 'After approved auto-logon work completes:'
              $handoff += 'Double-click Run-AutoLogonStateDelta.cmd and choose option 2. The launcher remembers this run ID and baseline targets.'
          '@
          if (-not $content.Contains($old)) {
            throw 'Expected legacy After-command handoff was not found.'
          }
          $content = $content.Replace($old, $new)
          Set-Content -LiteralPath $path -Value $content -Encoding UTF8
          Remove-Item -LiteralPath '.\.github\workflows\patch-autologon-handoff-launcher.yml' -Force

      - name: Commit launcher handoff
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/Invoke-SasAutoLogonStateDelta.ps1 .github/workflows/patch-autologon-handoff-launcher.yml
          git commit -m 'fix(autologon): direct handoff to stateful launcher'
          git push origin HEAD:feat/2026-07-13-autologon-state-delta
