name: Operational Harness Infrastructure

permissions:
  contents: read

on:
  pull_request:
    paths:
      - '.gitattributes'
      - 'CODEBASE_MAP.md'
      - '.githooks/**'
      - 'scripts/install-local-harness-hooks.sh'
      - 'scripts/check-repo-text-policy.py'
      - 'harness/api/operational-harness-manifest.json'
      - 'harness/api/harness-artifact-registry.json'
      - 'harness/workflows/operational-harness-maintenance.yaml'
      - 'schemas/harness/operational-harness-manifest.schema.json'
      - 'docs/HARNESS_STATUS.md'
      - 'Tests/survey/test_operational_harness_completeness_contracts.py'
      - 'Tests/survey/test_local_harness_contracts.py'
      - 'tests/survey/run_offline_survey_tests.sh'
      - '.github/workflows/harness-infrastructure.yml'
  push:
    branches: [main, 'feat/**', 'repair/**', 'refactor/**', 'docs/**', 'harness/**']
    paths:
      - '.gitattributes'
      - 'CODEBASE_MAP.md'
      - '.githooks/**'
      - 'scripts/install-local-harness-hooks.sh'
      - 'scripts/check-repo-text-policy.py'
      - 'harness/api/operational-harness-manifest.json'
      - 'harness/api/harness-artifact-registry.json'
      - 'harness/workflows/operational-harness-maintenance.yaml'
      - 'schemas/harness/operational-harness-manifest.schema.json'
      - 'docs/HARNESS_STATUS.md'
      - 'Tests/survey/test_operational_harness_completeness_contracts.py'
      - 'Tests/survey/test_local_harness_contracts.py'
      - 'tests/survey/run_offline_survey_tests.sh'
      - '.github/workflows/harness-infrastructure.yml'
  workflow_dispatch:

jobs:
  completeness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install schema dependency
        run: python -m pip install jsonschema

      - name: Compile harness validators
        run: >-
          python -m py_compile
          Tests/survey/test_operational_harness_completeness_contracts.py
          Tests/survey/test_local_harness_contracts.py
          scripts/check-repo-text-policy.py

      - name: Validate operational harness manifest schema
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import jsonschema
          manifest = json.loads(Path('harness/api/operational-harness-manifest.json').read_text(encoding='utf-8'))
          schema = json.loads(Path('schemas/harness/operational-harness-manifest.schema.json').read_text(encoding='utf-8'))
          jsonschema.Draft202012Validator(schema).validate(manifest)
          print('PASS: operational harness manifest schema')
          PY

      - name: Run harness completeness contracts
        run: python Tests/survey/test_operational_harness_completeness_contracts.py

      - name: Run existing local harness contracts
        run: python Tests/survey/test_local_harness_contracts.py

      - name: Check changed Git text blobs
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            python scripts/check-repo-text-policy.py --range "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
          else
            python scripts/check-repo-text-policy.py --commit HEAD
          fi

      - name: Parse hook and runner shell surfaces
        run: bash -n .githooks/pre-commit .githooks/pre-push scripts/install-local-harness-hooks.sh tests/survey/run_offline_survey_tests.sh

      - name: Check pull-request patch whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

      - name: Check pushed commit whitespace
        if: github.event_name != 'pull_request'
        run: git show --check --oneline --no-renames HEAD
