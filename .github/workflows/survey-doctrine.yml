      - 'scripts/SasLowNoisePolicy.psm1'
      - 'scripts/SasProgress.psm1'
      - 'scripts/validate-low-noise-policy.py'
      - 'scripts/render-sas-structured-log.py'
      - 'survey/**'
      - 'scripts/SasTargetIntake.psm1'
      - 'targets/README.md'
      - 'Tests/bash/*naabu*'
      - 'Tests/bash/test_cybernet_detect_contracts.sh'
      - 'Tests/bash/test_northwell_registry_verification_contracts.sh'
      - 'Tests/bash/test_packet_probe_contracts.sh'
      - 'Tests/bash/test_repo_naabu_doctrine_conformance.sh'
      - 'Tests/bash/test_target_intake_centralization_contracts.sh'
      - 'Tests/bash/test_target_reduction_plan_contracts.sh'
      - 'Tests/bash/test_progress_reporting_contracts.sh'
      - 'Tests/Pester/SasProgress.Tests.ps1'
      - 'Tests/survey/test_checkpoint_discipline_contracts.py'
      - 'Tests/survey/test_local_harness_contracts.py'
      - 'Tests/survey/test_low_noise_policy_contracts.py'
      - 'Tests/survey/test_port_fallback_decision_contracts.py'
      - 'Tests/survey/test_english_event_renderer.py'
      - 'Tests/Pester/SasLowNoisePolicy.Tests.ps1'
      - 'Tests/survey/test_probe_socket_access_contracts.py'
      - 'Tests/survey/test_standard_corporate_tooling_contracts.py'
      - 'tests/survey/run_offline_survey_tests.sh'
      - '.github/workflows/survey-doctrine.yml'

jobs:
  doctrine:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Run Naabu doctrine contract tests
        id: naabu_doctrine
        shell: bash
        run: |
          set +e
          bash Tests/bash/test_repo_naabu_doctrine_conformance.sh > naabu-doctrine.log 2>&1
          code=$?
          cat naabu-doctrine.log
          printf 'exit_code=%s\n' "$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Naabu doctrine diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naabu-doctrine-contract-log
          path: naabu-doctrine.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce Naabu doctrine contract result
        shell: bash
        env:
          NAABU_DOCTRINE_EXIT_CODE: ${{ steps.naabu_doctrine.outputs.exit_code }}
        run: |
          test "$NAABU_DOCTRINE_EXIT_CODE" -eq 0

      - name: Central target intake contracts
        shell: bash
        run: |
          bash Tests/bash/test_target_intake_centralization_contracts.sh

      - name: Probe access boundary contracts
        shell: bash
        run: |
          python3 Tests/survey/test_probe_socket_access_contracts.py

      - name: Standard corporate tooling contracts
        shell: bash
        run: |
          python3 Tests/survey/test_standard_corporate_tooling_contracts.py

      - name: Local harness contracts
        shell: bash
        run: |
          python3 Tests/survey/test_local_harness_contracts.py

      - name: Checkpoint discipline contracts
        shell: bash
        run: |
          python3 Tests/survey/test_checkpoint_discipline_contracts.py

      - name: Low-noise policy and English event contracts
        shell: bash
        run: |
          python3 scripts/validate-low-noise-policy.py
          python3 Tests/survey/test_low_noise_policy_contracts.py
          python3 Tests/survey/test_english_event_renderer.py

      - name: Port-fallback decision contracts
        shell: bash
        run: |
          python3 Tests/survey/test_port_fallback_decision_contracts.py

      - name: Naabu profile sync contracts
        shell: bash
        run: |
          bash Tests/bash/test_naabu_profile_sync.sh

      - name: Progress reporting contracts
        shell: bash
        run: |
          bash Tests/bash/test_progress_reporting_contracts.sh

      - name: Transport progress and CSV contracts
        shell: bash
        run: |
          bash bash/transport/tests/test_transport_contracts.sh

      - name: Target reduction Bash syntax
        shell: bash
        run: |
          bash -n survey/sas-target-reduction-plan.sh

      - name: Target reduction planner contracts
        shell: bash
        run: |
          bash Tests/bash/test_target_reduction_plan_contracts.sh

      - name: Northwell registry verification contracts
        shell: bash
        run: |
          bash Tests/bash/test_northwell_registry_verification_contracts.sh

      - name: Go packet expenditure tests
        shell: bash
        run: |
          cd probe/packet-expenditure
          go test ./...
