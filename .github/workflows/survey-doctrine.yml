      - 'targets/README.md'
      - 'Tests/bash/*naabu*'
      - 'Tests/bash/test_cybernet_detect_contracts.sh'
      - 'Tests/bash/test_northwell_registry_verification_contracts.sh'
      - 'Tests/bash/test_packet_probe_contracts.sh'
      - 'Tests/bash/test_repo_naabu_doctrine_conformance.sh'
      - 'Tests/bash/test_target_intake_centralization_contracts.sh'
      - 'Tests/bash/test_target_reduction_plan_contracts.sh'
      - 'Tests/bash/test_progress_reporting_contracts.sh'
      - 'Tests/Pester/SasProgress.Tests.ps1'
      - 'Tests/survey/test_checkpoint_discipline_contracts.py'
      - 'Tests/survey/test_local_harness_contracts.py'
      - 'Tests/survey/test_low_noise_policy_contracts.py'
      - 'Tests/survey/test_port_fallback_decision_contracts.py'
      - 'Tests/survey/test_english_event_renderer.py'
      - 'Tests/Pester/SasLowNoisePolicy.Tests.ps1'
      - 'Tests/survey/test_probe_socket_access_contracts.py'
      - 'Tests/survey/test_standard_corporate_tooling_contracts.py'
