name: AutoLogon Canonical Fixture E2E

on:
  pull_request:
    paths:
      - 'harness/e2e/e2e-profiles.json'
      - 'schemas/harness/autologon-*.schema.json'
      - 'scripts/Invoke-SasAutoLogon*.ps1'
      - 'scripts/Show-SasAutoLogonResult.ps1'
      - 'Inspect-LatestAutoLogon.cmd'
      - 'docs/AUTOLOGON_*.md'
      - 'docs/examples/autologon-runtime-proof.example.json'
      - 'docs/launch-and-doc-index.md'
      - 'CODEBASE_MAP.md'
      - 'scripts/Invoke-SasEndToEndValidation.ps1'
      - 'scripts/SasSoftwareDeploymentAdapter.psm1'
      - 'scripts/Build-SasSoftwareInstallFixtureExecutable.ps1'
      - 'tools/validate_autologon_e2e_artifacts.py'
      - 'Tests/Fixtures/autologon-*/**'
      - 'Tests/Fixtures/smb-scheduled-task-deployment/**'
      - 'Tests/fixtures/software-install/**'
      - 'Tests/Pester/AutoLogonCanonical*.Tests.ps1'
      - 'Tests/survey/test_autologon_*contracts.py'
      - 'Tests/survey/test_canonical_smb_task_deployment_contracts.py'
      - 'tests/survey/run_offline_survey_tests.sh'
      - '.github/workflows/autologon-canonical-e2e.yml'
  push:
    branches:
      - main
      - 'test/**'
    paths:
      - 'harness/e2e/e2e-profiles.json'
      - 'schemas/harness/autologon-*.schema.json'
      - 'scripts/Invoke-SasAutoLogon*.ps1'
      - 'scripts/Show-SasAutoLogonResult.ps1'
      - 'Inspect-LatestAutoLogon.cmd'
      - 'docs/AUTOLOGON_*.md'
      - 'docs/examples/autologon-runtime-proof.example.json'
      - 'docs/launch-and-doc-index.md'
      - 'CODEBASE_MAP.md'
      - 'scripts/Invoke-SasEndToEndValidation.ps1'
      - 'scripts/SasSoftwareDeploymentAdapter.psm1'
      - 'scripts/Build-SasSoftwareInstallFixtureExecutable.ps1'
      - 'tools/validate_autologon_e2e_artifacts.py'
      - 'Tests/Fixtures/autologon-*/**'
      - 'Tests/Fixtures/smb-scheduled-task-deployment/**'
      - 'Tests/fixtures/software-install/**'
      - 'Tests/Pester/AutoLogonCanonical*.Tests.ps1'
      - 'Tests/survey/test_autologon_*contracts.py'
      - 'Tests/survey/test_canonical_smb_task_deployment_contracts.py'
      - 'tests/survey/run_offline_survey_tests.sh'
      - '.github/workflows/autologon-canonical-e2e.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate AutoLogon E2E and transport contracts
        run: |
          python3 Tests/survey/test_autologon_proof_contract_floor_contracts.py
          python3 Tests/survey/test_autologon_deployment_workflow_contracts.py
          python3 Tests/survey/test_autologon_admin_runtime_runbook_contracts.py
          python3 Tests/survey/test_canonical_smb_task_deployment_contracts.py
          python3 Tests/survey/test_autologon_canonical_e2e_contracts.py

  windows-powershell-51-e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Pester 5 for Windows PowerShell
        shell: powershell
        run: |
          Install-Module Pester -MinimumVersion 5.0 -Scope CurrentUser -Force -SkipPublisherCheck
      - name: Run focused AutoLogon application and E2E Pester
        shell: powershell
        run: |
          Import-Module Pester -MinimumVersion 5.0
          $result = Invoke-Pester -Path @(
            '.\Tests\Pester\AutoLogonCanonicalDeployment.Tests.ps1',
            '.\Tests\Pester\AutoLogonCanonicalE2E.Tests.ps1',
            '.\Tests\Pester\AutoLogonCanonicalResultPresenter.Tests.ps1'
          ) -PassThru
          if ($result.FailedCount -gt 0) { throw "$($result.FailedCount) focused Pester tests failed." }
      - name: Run dedicated AutoLogon profile under Windows PowerShell 5.1
        shell: powershell
        run: |
          & powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File .\scripts\Invoke-SasEndToEndValidation.ps1 `
            -Profile autologon `
            -OutputRoot .\survey\output\e2e-validation
          if ($LASTEXITCODE -ne 0) { throw "AutoLogon E2E profile failed with exit code $LASTEXITCODE." }
      - name: Upload sanitized AutoLogon fixture proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autologon-canonical-fixture-e2e
          path: |
            survey/output/e2e-validation/**/autologon-canonical-fixture-e2e/autologon_canonical_e2e_result.json
            survey/output/e2e-validation/**/autologon-canonical-fixture-e2e/autologon_e2e_matrix.txt
            survey/output/e2e-validation/**/autologon-canonical-fixture-e2e/autologon_proof_receipt.json
          if-no-files-found: error
