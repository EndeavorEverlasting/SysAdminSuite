name: One-command Harness Proof

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/one-command-harness-proof.yml'
      - 'scripts/validate-sysadmin-harness.ps1'
      - 'scripts/SasRunContext.psm1'
      - 'scripts/Render-SasEnglishReport.ps1'
      - 'scripts/Invoke-SasHarnessContracts.ps1'
      - 'Tests/Pester/SasRunContext.Tests.ps1'
      - 'Tests/bash/test_sysadmin_harness_validator_contracts.sh'
      - 'Tests/survey/test_one_command_harness_proof_contracts.py'
      - 'Tests/survey/test_run_context_contracts.py'
      - 'tests/survey/run_offline_survey_tests.sh'
      - 'schemas/harness/**'
      - 'survey/fixtures/english-log/**'
      - 'survey/workflows/**'
      - 'harness/api/sas-harness-api.json'
      - 'mcp/local/servers.json'
      - '.githooks/**'
  push:
    branches:
      - main
      - 'feat/**'
    paths:
      - '.github/workflows/one-command-harness-proof.yml'
      - 'scripts/validate-sysadmin-harness.ps1'
      - 'scripts/SasRunContext.psm1'
      - 'scripts/Render-SasEnglishReport.ps1'
      - 'scripts/Invoke-SasHarnessContracts.ps1'
      - 'Tests/Pester/SasRunContext.Tests.ps1'
      - 'Tests/bash/test_sysadmin_harness_validator_contracts.sh'
      - 'Tests/survey/test_one_command_harness_proof_contracts.py'
      - 'Tests/survey/test_run_context_contracts.py'
      - 'tests/survey/run_offline_survey_tests.sh'
      - 'schemas/harness/**'
      - 'survey/fixtures/english-log/**'
      - 'survey/workflows/**'
      - 'harness/api/sas-harness-api.json'
      - 'mcp/local/servers.json'
      - '.githooks/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  synthetic-proof:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run executable proof contracts
        shell: pwsh
        run: |
          python .\Tests\survey\test_one_command_harness_proof_contracts.py

      - name: Run one-command synthetic validator
        shell: pwsh
        run: |
          & .\scripts\validate-sysadmin-harness.ps1 -OutputRoot .\survey\output\harness-validator

      - name: Validate machine-readable proof schema
        shell: pwsh
        run: |
          $result = Get-ChildItem -LiteralPath .\survey\output\harness-validator -Filter harness_validation_result.json -Recurse -File |
            Sort-Object LastWriteTimeUtc |
            Select-Object -Last 1
          if (-not $result) {
            throw 'One-command validator did not emit harness_validation_result.json.'
          }
          $json = Get-Content -LiteralPath $result.FullName -Raw
          $valid = Test-Json -Json $json -SchemaFile .\schemas\harness\harness-proof-result.schema.json
          if (-not $valid) {
            throw 'Harness validation result did not satisfy harness-proof-result.schema.json.'
          }
          Write-Host "[PASS] schema-backed harness proof result: $($result.FullName)"

      - name: Upload synthetic proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: one-command-harness-proof
          path: |
            survey/output/harness-validator/**/reports/harness_validation_matrix.txt
            survey/output/harness-validator/**/reports/harness_validation_result.json
          if-no-files-found: error
