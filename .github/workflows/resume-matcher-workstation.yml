name: Resume Matcher workstation contracts

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'Config/resume-matcher-workstation.sample.json'
      - 'schemas/harness/resume-matcher-workstation*.schema.json'
      - 'scripts/invoke-sas-resume-matcher-workstation.sh'
      - 'scripts/Invoke-SasResumeMatcherWorkstation.ps1'
      - 'docs/RESUME_MATCHER_WORKSTATION.md'
      - 'Tests/survey/test_resume_matcher_workstation_contracts.py'
      - 'CODEBASE_MAP.md'
      - '.github/workflows/resume-matcher-workstation.yml'
  push:
    branches: [main, 'feat/**', 'repair/**', 'test/**']
    paths:
      - 'Config/resume-matcher-workstation.sample.json'
      - 'schemas/harness/resume-matcher-workstation*.schema.json'
      - 'scripts/invoke-sas-resume-matcher-workstation.sh'
      - 'scripts/Invoke-SasResumeMatcherWorkstation.ps1'
      - 'docs/RESUME_MATCHER_WORKSTATION.md'
      - 'Tests/survey/test_resume_matcher_workstation_contracts.py'
      - 'CODEBASE_MAP.md'
      - '.github/workflows/resume-matcher-workstation.yml'

jobs:
  contracts:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile deployment contracts
        run: python -m py_compile Tests/survey/test_resume_matcher_workstation_contracts.py
      - name: Run Linux fixture and contract suite
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -o pipefail
          python Tests/survey/test_resume_matcher_workstation_contracts.py 2>&1 | tee resume-matcher-contracts.log
      - name: Upload failed contract diagnostics
        if: failure() && runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: resume-matcher-contract-diagnostics
          path: resume-matcher-contracts.log
          if-no-files-found: error
          retention-days: 7
      - name: Bash syntax
        if: runner.os != 'Windows'
        run: bash -n scripts/invoke-sas-resume-matcher-workstation.sh
      - name: PowerShell parser
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path '.\scripts\Invoke-SasResumeMatcherWorkstation.ps1'),
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }
          'PASS: PowerShell parser'
      - name: Validate schema posture
        shell: bash
        run: >-
          python -c "import json; from pathlib import Path;
          paths=[Path('schemas/harness/resume-matcher-workstation.schema.json'),Path('schemas/harness/resume-matcher-workstation-result.schema.json')];
          schemas=[json.loads(path.read_text(encoding='utf-8')) for path in paths];
          assert all(schema['$schema']=='https://json-schema.org/draft/2020-12/schema' for schema in schemas);
          assert all(schema['additionalProperties'] is False for schema in schemas);
          print('PASS: Resume Matcher schema posture')"
