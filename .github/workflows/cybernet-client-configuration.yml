name: Cybernet Client Configuration

on:
  pull_request:
    paths:
      - 'Config/cybernet-client-preferences.json'
      - 'Hardware/Cybernet/Invoke-CybernetClientConfiguration.ps1'
      - 'Run-CybernetClientConfiguration.cmd'
      - 'docs/tutorials/CYBERNET_CLIENT_CONFIGURATION.md'
      - 'Hardware/Cybernet/README.md'
      - 'START-HERE-CYBERNET-SOFTWARE-DEPLOYMENT.md'
      - 'Tests/Pester/CybernetClientConfiguration.Tests.ps1'
      - 'Tests/survey/test_cybernet_client_configuration_contracts.py'
      - 'tests/survey/run_offline_survey_tests.sh'
      - '.github/workflows/cybernet-client-configuration.yml'
  push:
    branches:
      - main
    paths:
      - 'Config/cybernet-client-preferences.json'
      - 'Hardware/Cybernet/Invoke-CybernetClientConfiguration.ps1'
      - 'Run-CybernetClientConfiguration.cmd'
      - 'docs/tutorials/CYBERNET_CLIENT_CONFIGURATION.md'
      - 'Hardware/Cybernet/README.md'
      - 'START-HERE-CYBERNET-SOFTWARE-DEPLOYMENT.md'
      - 'Tests/Pester/CybernetClientConfiguration.Tests.ps1'
      - 'Tests/survey/test_cybernet_client_configuration_contracts.py'
      - 'tests/survey/run_offline_survey_tests.sh'
      - '.github/workflows/cybernet-client-configuration.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fixture-and-contracts:
    runs-on: windows-2025
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run dependency-free contracts
        shell: pwsh
        run: python Tests/survey/test_cybernet_client_configuration_contracts.py

      - name: Parse composed PowerShell surface
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path -LiteralPath 'Hardware/Cybernet/Invoke-CybernetClientConfiguration.ps1'),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if (@($errors).Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            throw 'Cybernet client configuration parser validation failed.'
          }

      - name: Run complete fixture client configuration
        shell: pwsh
        run: |
          $outputRoot = Join-Path $PWD 'survey/output/cybernet-client-configuration-ci'
          if (Test-Path -LiteralPath $outputRoot) {
            Remove-Item -LiteralPath $outputRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $outputRoot -Force | Out-Null
          $consolePath = Join-Path $outputRoot 'client-configuration-fixture.console.log'
          $console = @(& pwsh -NoProfile -File .\Hardware\Cybernet\Invoke-CybernetClientConfiguration.ps1 `
            -Mode Apply `
            -ComputerName 'CYBERNET-FIXTURE-01' `
            -FixtureMode `
            -OutputRoot $outputRoot 2>&1 | ForEach-Object { $_.ToString() })
          $exitCode = $LASTEXITCODE
          $console | Tee-Object -FilePath $consolePath | Write-Host
          if ($exitCode -ne 0) {
            throw "Fixture client configuration exited $exitCode."
          }
          $summaryPath = Get-ChildItem -LiteralPath $outputRoot -Filter 'cybernet_client_configuration_summary.json' -File -Recurse |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $summaryPath) { throw 'Fixture client configuration did not emit a summary.' }
          $summary = Get-Content -LiteralPath $summaryPath -Raw -Encoding UTF8 | ConvertFrom-Json
          if ($summary.status -ne 'FIXTURE_PASS') { throw "Unexpected fixture status: $($summary.status)" }
          if (@($summary.stages).Count -ne 3) { throw "Expected three composed stages; found $(@($summary.stages).Count)." }
          if (@($summary.stages | Where-Object exit_code -ne 0).Count -ne 0) { throw 'A composed fixture stage failed.' }
          if ($summary.network_activity_performed -or $summary.target_mutation_attempted -or $summary.automatic_reboot_performed -or $summary.com_mutation_performed) {
            throw 'Fixture summary overclaimed network or mutation behavior.'
          }
          if (-not (Test-Path -LiteralPath $summary.software_acceptance_path -PathType Leaf)) {
            throw 'Technician acceptance checklist was not emitted.'
          }
          Write-Host "PASS: fixture summary $summaryPath"

      - name: Upload fixture evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cybernet-client-configuration-fixture
          path: survey/output/cybernet-client-configuration-ci
          if-no-files-found: warn
          retention-days: 7

      - name: Install Pester 5
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.0 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run focused Pester contracts
        shell: pwsh
        run: |
          .\tools\Test-Pester5Suite.ps1 `
            -TestPath .\Tests\Pester\CybernetClientConfiguration.Tests.ps1

      - name: Check pull-request patch whitespace
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff --check "origin/${{ github.base_ref }}...HEAD"

      - name: Check pushed commit whitespace
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: git show --check --oneline --no-renames HEAD
