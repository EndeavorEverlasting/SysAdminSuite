name: AutoLogon State Delta Contracts

on:
  pull_request:
    paths:
      - 'Run-AutoLogonStateDelta.cmd'
      - 'scripts/Start-SasAutoLogonStateDelta.ps1'
      - 'scripts/Invoke-SasAutoLogonStateDelta.ps1'
      - 'survey/sas-autologon-state-delta.sh'
      - 'docs/AUTOLOGON_STATE_DELTA.md'
      - 'Tests/survey/test_autologon_state_delta_contracts.py'
      - '.github/workflows/autologon-state-delta-contracts.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false
          persist-credentials: false

      - name: Run stateful technician launcher fixture proof
        id: fixture
        continue-on-error: true
        shell: pwsh
        run: |
          $runId = 'autologon-delta-20260713-170000-1a2b3c4d'
          $outputRoot = Join-Path $PWD 'survey\output\autologon_state_delta'
          New-Item -ItemType Directory -Path $outputRoot -Force | Out-Null
          $diagnosticPath = Join-Path $outputRoot 'fixture-diagnostic.txt'
          $failureFlag = Join-Path $outputRoot 'fixture-failed.flag'

          try {
            .\scripts\Start-SasAutoLogonStateDelta.ps1 `
              -Action Before `
              -ComputerName SAMPLE001 `
              -RunId $runId `
              -OutputRoot $outputRoot `
              -TechnicianLabel 'synthetic-ci' `
              -FixtureMode `
              -NonInteractive `
              -NoOpen

            $statePath = Join-Path $outputRoot 'operator-state.json'
            $beforeState = Get-Content -LiteralPath $statePath -Raw | ConvertFrom-Json
            if ($beforeState.active_run_id -ne $runId) {
              throw "Launcher did not remember the Before RunId. Found: $($beforeState.active_run_id)"
            }
            if ($beforeState.phase -ne 'before_complete') {
              throw "Expected before_complete state; found $($beforeState.phase)."
            }

            .\scripts\Start-SasAutoLogonStateDelta.ps1 `
              -Action After `
              -OutputRoot $outputRoot `
              -FixtureMode `
              -NonInteractive `
              -NoOpen

            $afterState = Get-Content -LiteralPath $statePath -Raw | ConvertFrom-Json
            if ($afterState.active_run_id -ne $runId) {
              throw "After action did not reuse the saved RunId. Found: $($afterState.active_run_id)"
            }
            if ($afterState.phase -ne 'after_complete') {
              throw "Expected after_complete state; found $($afterState.phase)."
            }

            $summaryPath = Join-Path $outputRoot "$runId\autologon_state_delta_summary.json"
            $summary = Get-Content -LiteralPath $summaryPath -Raw | ConvertFrom-Json
            if ($summary.confirmed_state_transition_count -ne 1) {
              throw "Expected one CONFIRMED_STATE_TRANSITION; found $($summary.confirmed_state_transition_count)."
            }
            if ($summary.default_password_value_collected -ne $false) {
              throw 'Fixture summary violated the password-data boundary.'
            }
            if ($summary.target_mutation_performed -ne $false) {
              throw 'Fixture summary incorrectly reported target mutation.'
            }
            'PASS: stateful launcher remembered RunId and targets and produced one confirmed transition.' |
              Set-Content -LiteralPath $diagnosticPath -Encoding UTF8
          }
          catch {
            @(
              'FAIL: stateful technician launcher fixture proof',
              "Exception: $($_.Exception.Message)",
              "Position: $($_.InvocationInfo.PositionMessage)",
              'Full error:',
              ($_ | Out-String)
            ) | Set-Content -LiteralPath $diagnosticPath -Encoding UTF8
            New-Item -ItemType File -Path $failureFlag -Force | Out-Null
            Get-Content -LiteralPath $diagnosticPath
            exit 1
          }

      - name: Run static contracts
        shell: pwsh
        run: python .\Tests\survey\test_autologon_state_delta_contracts.py

      - name: Parse PowerShell collector and technician launcher
        shell: pwsh
        run: |
          $paths = @(
            '.\scripts\Invoke-SasAutoLogonStateDelta.ps1',
            '.\scripts\Start-SasAutoLogonStateDelta.ps1'
          )
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $path),
              [ref]$tokens,
              [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "$path: $($_.Message)" }
              throw "$path reported $($errors.Count) PowerShell parser error(s)."
            }
          }
          Write-Host 'PASS: PowerShell parser accepted collector and technician launcher.'

      - name: Verify CMD launcher rejects arguments without prompting
        shell: pwsh
        run: |
          $process = Start-Process `
            -FilePath 'cmd.exe' `
            -ArgumentList @('/d', '/c', 'Run-AutoLogonStateDelta.cmd forbidden') `
            -Wait `
            -PassThru `
            -NoNewWindow
          if ($process.ExitCode -ne 2) {
            throw "Expected CMD launcher usage exit 2; found $($process.ExitCode)."
          }
          Write-Host 'PASS: double-click launcher rejects command-line arguments.'

      - name: Check Bash wrapper syntax
        shell: bash
        run: bash -n survey/sas-autologon-state-delta.sh

      - name: Upload synthetic fixture evidence and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autologon-state-delta-synthetic-evidence
          path: survey/output/autologon_state_delta/
          if-no-files-found: error

      - name: Enforce fixture result
        if: always()
        shell: pwsh
        run: |
          $failureFlag = Join-Path $PWD 'survey\output\autologon_state_delta\fixture-failed.flag'
          $diagnosticPath = Join-Path $PWD 'survey\output\autologon_state_delta\fixture-diagnostic.txt'
          if (Test-Path -LiteralPath $diagnosticPath) {
            Get-Content -LiteralPath $diagnosticPath
          }
          if (Test-Path -LiteralPath $failureFlag) {
            throw 'Stateful launcher fixture proof failed. See the uploaded diagnostic artifact.'
          }
