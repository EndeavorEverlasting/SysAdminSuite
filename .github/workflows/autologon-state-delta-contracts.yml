name: AutoLogon State Delta Contracts

on:
  pull_request:
    paths:
      - 'scripts/Invoke-SasAutoLogonStateDelta.ps1'
      - 'survey/sas-autologon-state-delta.sh'
      - 'docs/AUTOLOGON_STATE_DELTA.md'
      - 'Tests/survey/test_autologon_state_delta_contracts.py'
      - '.github/workflows/autologon-state-delta-contracts.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'feat/2026-07-13-autologon-state-delta'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 2
          persist-credentials: true

      - name: Apply fail-closed password-presence gate
        shell: python
        run: |
          from pathlib import Path

          script_path = Path('scripts/Invoke-SasAutoLogonStateDelta.ps1')
          text = script_path.read_text(encoding='utf-8')

          old_param = "param([string]$ExpectedName, [object]$IntentValue, [object]$EnabledValue, [object]$UserValue)"
          new_param = "param([string]$ExpectedName, [object]$IntentValue, [object]$EnabledValue, [object]$UserValue, [bool]$PasswordPresent)"
          if text.count(old_param) != 1:
              raise SystemExit('Expected exactly one legacy Get-AutoLogonStatus parameter contract.')
          text = text.replace(old_param, new_param)

          old_decision = """        if ($enabled -and $actual -eq $expected) { return 'autologon_ready' }
                  if ($enabled -and $actual -ne $expected) { return 'configured_user_mismatch' }
          """
          new_decision = """        if ($enabled -and $actual -ne $expected) { return 'configured_user_mismatch' }
                  if ($enabled -and $actual -eq $expected -and -not $PasswordPresent) { return 'configured_password_missing' }
                  if ($enabled -and $actual -eq $expected -and $PasswordPresent) { return 'autologon_ready' }
          """
          if text.count(old_decision) != 1:
              raise SystemExit('Expected exactly one legacy ready-state decision block.')
          text = text.replace(old_decision, new_decision)

          old_call = "status = Get-AutoLogonStatus -ExpectedName $env:COMPUTERNAME -IntentValue $intentValue -EnabledValue $enabledValue -UserValue $userValue"
          new_call = old_call + " -PasswordPresent ([bool]$passwordPresent)"
          if text.count(old_call) != 1:
              raise SystemExit('Expected exactly one legacy Get-AutoLogonStatus call.')
          text = text.replace(old_call, new_call)
          script_path.write_text(text, encoding='utf-8', newline='\n')

          test_path = Path('Tests/survey/test_autologon_state_delta_contracts.py')
          tests = test_path.read_text(encoding='utf-8')
          marker = "\ndef test_installed_software_inventory_avoids_product_class_queries() -> None:\n"
          addition = """

def test_autologon_ready_requires_default_password_presence() -> None:
    content = read(PS_SCRIPT)
    required = (
        "[bool]$PasswordPresent",
        "configured_password_missing",
        "$enabled -and $actual -eq $expected -and -not $PasswordPresent",
        "$enabled -and $actual -eq $expected -and $PasswordPresent",
        "-PasswordPresent ([bool]$passwordPresent)",
    )
    for fragment in required:
        assert fragment in content, f"missing fail-closed password-presence gate: {fragment}"

"""
          if marker not in tests:
              raise SystemExit('Unable to find insertion marker for password-presence contract.')
          tests = tests.replace(marker, addition + marker, 1)

          list_marker = "        test_default_password_data_is_never_read_or_exported,\n        test_installed_software_inventory_avoids_product_class_queries,"
          list_replacement = "        test_default_password_data_is_never_read_or_exported,\n        test_autologon_ready_requires_default_password_presence,\n        test_installed_software_inventory_avoids_product_class_queries,"
          if tests.count(list_marker) != 1:
              raise SystemExit('Unable to wire password-presence contract into test runner.')
          tests = tests.replace(list_marker, list_replacement)
          test_path.write_text(tests, encoding='utf-8', newline='\n')

          doc_path = Path('docs/AUTOLOGON_STATE_DELTA.md')
          docs = doc_path.read_text(encoding='utf-8')
          doc_marker = "Do not add password data, secret values, deployment credentials, or account passwords to snapshot,\ndelta, CSV, JSON, screenshot, or handoff artifacts."
          doc_replacement = "The classifier reports `autologon_ready` only when `AutoAdminLogon` is enabled, the configured user matches the expected hostname-based account, and the `DefaultPassword` value name is present. An enabled matching account without that value is reported as `configured_password_missing`; the value data remains unread.\n\n" + doc_marker
          if docs.count(doc_marker) != 1:
              raise SystemExit('Unable to find credential-boundary documentation marker.')
          docs = docs.replace(doc_marker, doc_replacement)
          doc_path.write_text(docs, encoding='utf-8', newline='\n')

      - name: Validate repair
        shell: bash
        run: |
          set -euo pipefail
          python Tests/survey/test_autologon_state_delta_contracts.py
          git diff --check

      - name: Restore workflow and commit repair
        shell: bash
        run: |
          set -euo pipefail
          git show HEAD^:.github/workflows/autologon-state-delta-contracts.yml > .github/workflows/autologon-state-delta-contracts.yml
          git add scripts/Invoke-SasAutoLogonStateDelta.ps1 \
            Tests/survey/test_autologon_state_delta_contracts.py \
            docs/AUTOLOGON_STATE_DELTA.md \
            .github/workflows/autologon-state-delta-contracts.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(autologon): require password presence for ready state'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  contracts:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Run offline before and after fixture proof
        id: fixture
        continue-on-error: true
        shell: pwsh
        run: |
          $runId = 'autologon-delta-20260713-170000-1a2b3c4d'
          $outputRoot = Join-Path $PWD 'survey\output\autologon_state_delta'
          New-Item -ItemType Directory -Path $outputRoot -Force | Out-Null
          $diagnosticPath = Join-Path $outputRoot 'fixture-diagnostic.txt'
          $failureFlag = Join-Path $outputRoot 'fixture-failed.flag'

          try {
            .\scripts\Invoke-SasAutoLogonStateDelta.ps1 `
              -Mode Before `
              -ComputerName SAMPLE001 `
              -RunId $runId `
              -OutputRoot $outputRoot `
              -TechnicianLabel 'synthetic-ci' `
              -FixtureMode

            .\scripts\Invoke-SasAutoLogonStateDelta.ps1 `
              -Mode After `
              -ComputerName SAMPLE001 `
              -RunId $runId `
              -OutputRoot $outputRoot `
              -TechnicianLabel 'synthetic-ci' `
              -FixtureMode

            $summaryPath = Join-Path $outputRoot "$runId\autologon_state_delta_summary.json"
            $summary = Get-Content -LiteralPath $summaryPath -Raw | ConvertFrom-Json
            if ($summary.confirmed_state_transition_count -ne 1) {
              throw "Expected one CONFIRMED_STATE_TRANSITION; found $($summary.confirmed_state_transition_count)."
            }
            if ($summary.default_password_value_collected -ne $false) {
              throw 'Fixture summary violated the password-data boundary.'
            }
            if ($summary.target_mutation_performed -ne $false) {
              throw 'Fixture summary incorrectly reported target mutation.'
            }
            'PASS: offline before/after fixture produced one confirmed state transition.' |
              Set-Content -LiteralPath $diagnosticPath -Encoding UTF8
          }
          catch {
            @(
              'FAIL: offline before/after fixture proof',
              "Exception: $($_.Exception.Message)",
              "Position: $($_.InvocationInfo.PositionMessage)",
              'Full error:',
              ($_ | Out-String)
            ) | Set-Content -LiteralPath $diagnosticPath -Encoding UTF8
            New-Item -ItemType File -Path $failureFlag -Force | Out-Null
            Get-Content -LiteralPath $diagnosticPath
            exit 1
          }

      - name: Run static contracts
        shell: pwsh
        run: python .\Tests\survey\test_autologon_state_delta_contracts.py

      - name: Parse PowerShell collector
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path '.\scripts\Invoke-SasAutoLogonStateDelta.ps1'),
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            throw "PowerShell parser reported $($errors.Count) error(s)."
          }
          Write-Host 'PASS: PowerShell parser accepted auto-logon state-delta collector.'

      - name: Check Bash wrapper syntax
        shell: bash
        run: bash -n survey/sas-autologon-state-delta.sh

      - name: Upload synthetic fixture evidence and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autologon-state-delta-synthetic-evidence
          path: survey/output/autologon_state_delta/
          if-no-files-found: error

      - name: Enforce fixture result
        if: always()
        shell: pwsh
        run: |
          $failureFlag = Join-Path $PWD 'survey\output\autologon_state_delta\fixture-failed.flag'
          $diagnosticPath = Join-Path $PWD 'survey\output\autologon_state_delta\fixture-diagnostic.txt'
          if (Test-Path -LiteralPath $diagnosticPath) {
            Get-Content -LiteralPath $diagnosticPath
          }
          if (Test-Path -LiteralPath $failureFlag) {
            throw 'Offline fixture proof failed. See the uploaded diagnostic artifact.'
          }
