name: AutoLogon State Delta Contracts

on:
  pull_request:
    paths:
      - 'scripts/Invoke-SasAutoLogonStateDelta.ps1'
      - 'scripts/Invoke-SasAutoLogonDeployment.ps1'
      - 'survey/sas-autologon-state-delta.sh'
      - 'docs/AUTOLOGON_STATE_DELTA.md'
      - 'docs/AUTOLOGON_DEPLOYMENT_WORKFLOW.md'
      - 'Tests/survey/test_autologon_state_delta_contracts.py'
      - 'Tests/survey/test_autologon_deployment_workflow_contracts.py'
      - '.github/workflows/autologon-state-delta-contracts.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Run offline before and after fixture proof
        id: fixture
        continue-on-error: true
        shell: pwsh
        run: |
          $runId = 'autologon-delta-20260713-170000-1a2b3c4d'
          $outputRoot = Join-Path $PWD 'survey\output\autologon_state_delta'
          New-Item -ItemType Directory -Path $outputRoot -Force | Out-Null
          $diagnosticPath = Join-Path $outputRoot 'fixture-diagnostic.txt'
          $failureFlag = Join-Path $outputRoot 'fixture-failed.flag'

          try {
            .\scripts\Invoke-SasAutoLogonStateDelta.ps1 `
              -Mode Before `
              -ComputerName SAMPLE001 `
              -RunId $runId `
              -OutputRoot $outputRoot `
              -TechnicianLabel 'synthetic-ci' `
              -FixtureMode

            .\scripts\Invoke-SasAutoLogonStateDelta.ps1 `
              -Mode After `
              -ComputerName SAMPLE001 `
              -RunId $runId `
              -OutputRoot $outputRoot `
              -TechnicianLabel 'synthetic-ci' `
              -FixtureMode

            $summaryPath = Join-Path $outputRoot "$runId\autologon_state_delta_summary.json"
            $summary = Get-Content -LiteralPath $summaryPath -Raw | ConvertFrom-Json
            if ($summary.confirmed_state_transition_count -ne 1) {
              throw "Expected one CONFIRMED_STATE_TRANSITION; found $($summary.confirmed_state_transition_count)."
            }
            if ($summary.default_password_value_collected -ne $false) {
              throw 'Fixture summary violated the password-data boundary.'
            }
            if ($summary.target_mutation_performed -ne $false) {
              throw 'Fixture summary incorrectly reported target mutation.'
            }
            'PASS: offline before/after fixture produced one confirmed state transition.' |
              Set-Content -LiteralPath $diagnosticPath -Encoding UTF8
          }
          catch {
            @(
              'FAIL: offline before/after fixture proof',
              "Exception: $($_.Exception.Message)",
              "Position: $($_.InvocationInfo.PositionMessage)",
              'Full error:',
              ($_ | Out-String)
            ) | Set-Content -LiteralPath $diagnosticPath -Encoding UTF8
            New-Item -ItemType File -Path $failureFlag -Force | Out-Null
            Get-Content -LiteralPath $diagnosticPath
            exit 1
          }

      - name: Run offline deployment workflow fixture
        id: deployment_fixture
        continue-on-error: true
        shell: pwsh
        run: |
          $outputRoot = Join-Path $PWD 'survey\output\autologon_deployment'
          New-Item -ItemType Directory -Path $outputRoot -Force | Out-Null
          $diagnosticPath = Join-Path $outputRoot 'fixture-diagnostic.txt'
          $failureFlag = Join-Path $outputRoot 'fixture-failed.flag'

          try {
            $result = .\scripts\Invoke-SasAutoLogonDeployment.ps1 `
              -ComputerName SAMPLE001 `
              -TechnicianLabel 'synthetic-ci' `
              -OutputRoot $outputRoot `
              -FixtureMode

            $summary = Get-Content -LiteralPath $result.summary_json -Raw | ConvertFrom-Json
            if ($summary.status -ne 'FIXTURE_PASS') {
              throw "Expected FIXTURE_PASS; found $($summary.status)."
            }
            if ($summary.install_planned_count -ne 1) {
              throw "Expected one planned install; found $($summary.install_planned_count)."
            }
            if ($summary.confirmed_state_transition_count -ne 1) {
              throw "Expected one confirmed transition; found $($summary.confirmed_state_transition_count)."
            }
            if ($summary.startup_persistence_created -ne $false) {
              throw 'Fixture incorrectly reported startup persistence.'
            }
            if ($summary.default_password_value_collected -ne $false) {
              throw 'Fixture violated the password-data boundary.'
            }
            'PASS: offline AutoLogon deployment workflow fixture completed end to end.' |
              Set-Content -LiteralPath $diagnosticPath -Encoding UTF8
          }
          catch {
            @(
              'FAIL: offline AutoLogon deployment workflow fixture',
              "Exception: $($_.Exception.Message)",
              "Position: $($_.InvocationInfo.PositionMessage)",
              'Full error:',
              ($_ | Out-String)
            ) | Set-Content -LiteralPath $diagnosticPath -Encoding UTF8
            New-Item -ItemType File -Path $failureFlag -Force | Out-Null
            Get-Content -LiteralPath $diagnosticPath
            exit 1
          }

      - name: Run static contracts
        shell: pwsh
        run: |
          python .\Tests\survey\test_autologon_state_delta_contracts.py
          python .\Tests\survey\test_autologon_deployment_workflow_contracts.py

      - name: Parse PowerShell entrypoints
        shell: pwsh
        run: |
          $files = @(
            '.\scripts\Invoke-SasAutoLogonStateDelta.ps1',
            '.\scripts\Invoke-SasAutoLogonDeployment.ps1'
          )
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file),
              [ref]$tokens,
              [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "${file}: $($_.Message)" }
              throw "PowerShell parser reported $($errors.Count) error(s) for $file."
            }
          }
          Write-Host 'PASS: PowerShell parser accepted AutoLogon entrypoints.'

      - name: Check Bash wrapper syntax
        shell: bash
        run: bash -n survey/sas-autologon-state-delta.sh

      - name: Upload synthetic fixture evidence and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autologon-synthetic-evidence
          path: |
            survey/output/autologon_state_delta/
            survey/output/autologon_deployment/
          if-no-files-found: error

      - name: Enforce fixture results
        if: always()
        shell: pwsh
        run: |
          $checks = @(
            @{
              Name = 'state delta'
              FailureFlag = (Join-Path $PWD 'survey\output\autologon_state_delta\fixture-failed.flag')
              DiagnosticPath = (Join-Path $PWD 'survey\output\autologon_state_delta\fixture-diagnostic.txt')
            },
            @{
              Name = 'deployment workflow'
              FailureFlag = (Join-Path $PWD 'survey\output\autologon_deployment\fixture-failed.flag')
              DiagnosticPath = (Join-Path $PWD 'survey\output\autologon_deployment\fixture-diagnostic.txt')
            }
          )

          $failed = @()
          foreach ($check in $checks) {
            if (Test-Path -LiteralPath $check.DiagnosticPath) {
              Get-Content -LiteralPath $check.DiagnosticPath
            }
            if (Test-Path -LiteralPath $check.FailureFlag) {
              $failed += $check.Name
            }
          }

          if ($failed.Count -gt 0) {
            throw "Offline fixture proof failed: $($failed -join ', '). See the uploaded diagnostic artifact."
          }
