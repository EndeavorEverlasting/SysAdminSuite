name: Authorized Deployment Manifest Contracts

on:
  pull_request:
    paths:
      - 'scripts/Invoke-SasAuthorizedDeploymentManifest.ps1'
      - 'schemas/harness/authorized-deployment-manifest.schema.json'
      - 'Tests/survey/test_authorized_deployment_manifest_contracts.py'
      - 'docs/AUTHORIZED_DEPLOYMENT_MANIFEST.md'
      - 'examples/authorized-deployment-manifest.example.json'
      - '.github/workflows/authorized-deployment-manifest-contracts.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Run static contracts
        shell: pwsh
        run: python .\Tests\survey\test_authorized_deployment_manifest_contracts.py

      - name: Parse PowerShell adapter
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path '.\scripts\Invoke-SasAuthorizedDeploymentManifest.ps1'),
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            throw "PowerShell parser reported $($errors.Count) error(s)."
          }
          Write-Host 'PASS: PowerShell parser accepted authorized deployment manifest adapter.'

      - name: Run request-only manifest proof
        shell: pwsh
        run: |
          $outputRoot = Join-Path $PWD 'survey\output\authorized_app_deployment'
          $summary = .\scripts\Invoke-SasAuthorizedDeploymentManifest.ps1 `
            -ManifestPath .\examples\authorized-deployment-manifest.example.json `
            -OutputRoot $outputRoot `
            -WhatIf

          if ($summary.planned_count -ne 1) {
            throw "Expected one planned row; found $($summary.planned_count)."
          }
          if ($summary.target_mutation_performed -ne $false) {
            throw 'WhatIf proof incorrectly reported target mutation.'
          }
          if ($summary.interactive_logon_required -ne $false) {
            throw 'Adapter incorrectly reported an interactive logon dependency.'
          }
          if ($summary.service_created -ne $false -or $summary.scheduled_task_created -ne $false) {
            throw 'Adapter incorrectly reported persistence creation.'
          }
          Write-Host 'PASS: request-only manifest proof completed without target mutation.'
