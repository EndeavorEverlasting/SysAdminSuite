name: AutoLogon WinRM Blocker Recovery

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'Recover-AutoLogonWinRmBlocker.cmd'
      - 'scripts/SasAutoLogonSmbStateRecovery.psm1'
      - 'scripts/Invoke-SasAutoLogonWinRmRecovery.ps1'
      - 'scripts/Start-SasAutoLogonWinRmRecovery.ps1'
      - 'scripts/Test-SasSoftwareDeploymentTransport.ps1'
      - 'scripts/Invoke-SasSoftwareDeploymentTransportLiveCert.ps1'
      - 'scripts/Invoke-SasValidatedSoftwareDeployment.ps1'
      - 'docs/AUTOLOGON_WINRM_BLOCKER_RECOVERY.md'
      - 'Tests/survey/test_autologon_winrm_recovery_contracts.py'
      - 'Tests/Pester/AutoLogonWinRmRecovery.Tests.ps1'
      - '.github/workflows/autologon-winrm-recovery.yml'
  push:
    branches: [main, 'fix/**', 'feat/**', 'repair/**']
    paths:
      - 'Recover-AutoLogonWinRmBlocker.cmd'
      - 'scripts/SasAutoLogonSmbStateRecovery.psm1'
      - 'scripts/Invoke-SasAutoLogonWinRmRecovery.ps1'
      - 'scripts/Start-SasAutoLogonWinRmRecovery.ps1'
      - 'scripts/Test-SasSoftwareDeploymentTransport.ps1'
      - 'scripts/Invoke-SasSoftwareDeploymentTransportLiveCert.ps1'
      - 'scripts/Invoke-SasValidatedSoftwareDeployment.ps1'
      - 'docs/AUTOLOGON_WINRM_BLOCKER_RECOVERY.md'
      - 'Tests/survey/test_autologon_winrm_recovery_contracts.py'
      - 'Tests/Pester/AutoLogonWinRmRecovery.Tests.ps1'
      - '.github/workflows/autologon-winrm-recovery.yml'
  workflow_dispatch:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run WinRM recovery contracts
        run: python Tests/survey/test_autologon_winrm_recovery_contracts.py

      - name: Run existing AutoLogon state and deployment contracts
        run: |
          python Tests/survey/test_autologon_state_delta_contracts.py
          python Tests/survey/test_autologon_deployment_workflow_contracts.py
          python Tests/survey/test_software_deployment_transport_preflight_contracts.py
          python Tests/survey/test_canonical_smb_task_deployment_contracts.py

      - name: Compile contract
        run: python -m py_compile Tests/survey/test_autologon_winrm_recovery_contracts.py

      - name: Check patch whitespace
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git show --check --oneline --no-renames HEAD
          fi

  windows-fixture:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Parse recovery PowerShell under Windows PowerShell 5.1
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($path in @(
            '.\scripts\SasAutoLogonSmbStateRecovery.psm1',
            '.\scripts\Invoke-SasAutoLogonWinRmRecovery.ps1',
            '.\scripts\Start-SasAutoLogonWinRmRecovery.ps1'
          )) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($path, [ref]$tokens, [ref]$errors)
            if (@($errors).Count -gt 0) {
              throw "PowerShell parser errors in $path`: $($errors -join '; ')"
            }
          }
          Write-Host 'PASS: recovery PowerShell parses under Windows PowerShell 5.1'

      - name: Install Pester 5
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Install-Module Pester -MinimumVersion 5.0 -Scope CurrentUser -Force -SkipPublisherCheck | Out-Null

      - name: Run recovery FixtureMode Pester
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .\tools\Test-Pester5Suite.ps1 -TestPath .\Tests\Pester\AutoLogonWinRmRecovery.Tests.ps1
