name: Package analysis contracts

permissions:
  contents: read

on:
  pull_request:
    paths:
      - '.claude/skills/package-static-analysis/**'
      - '.claude/skills/package-vm-execution/**'
      - '.claude/capabilities/package-*.md'
      - 'harness/api/package-static-analysis-skill.json'
      - 'harness/api/package-semantic-analysis-skill.json'
      - 'harness/api/package-trust-verification-skill.json'
      - 'harness/api/package-strong-name-verification-skill.json'
      - 'harness/api/package-vm-qualification-skill.json'
      - 'harness/api/package-vm-execution-skill.json'
      - 'harness/api/package-vm-execution-routing.json'
      - 'harness/api/agent-capability-manifest.json'
      - 'harness/api/agent-routing-manifest.json'
      - 'harness/api/sas-harness-api.json'
      - 'harness/workflows/package-analysis.yaml'
      - 'harness/workflows/package-vm-execution.yaml'
      - 'schemas/harness/package-static-analysis-result.schema.json'
      - 'schemas/harness/package-semantic-analysis-result.schema.json'
      - 'schemas/harness/package-trust-policy.schema.json'
      - 'schemas/harness/package-trust-verification-result.schema.json'
      - 'schemas/harness/package-strong-name-verification-result.schema.json'
      - 'schemas/harness/package-vm-qualification-profile.schema.json'
      - 'schemas/harness/package-vm-execution-result.schema.json'
      - 'Tests/Fixtures/package-vm-qualification/**'
      - 'Tests/Fixtures/package-vm-execution/**'
      - 'tools/package-analysis/**'
      - 'scripts/Invoke-SasPackageStaticAnalysis.ps1'
      - 'scripts/Invoke-SasPackageSemanticAnalysis.ps1'
      - 'scripts/Invoke-SasPackageTrust.ps1'
      - 'scripts/Invoke-SasPackageStrongNameVerification.ps1'
      - 'scripts/Invoke-SasPackageDisposableVmRun.ps1'
      - 'scripts/invoke-sas-package-static-analysis.sh'
      - 'scripts/invoke-sas-package-semantic-analysis.sh'
      - 'scripts/invoke-sas-package-strong-name-verification.sh'
      - 'docs/PACKAGE_STATIC_ANALYSIS.md'
      - 'docs/PACKAGE_SEMANTIC_ANALYSIS.md'
      - 'docs/PACKAGE_TRUST_VERIFICATION.md'
      - 'docs/PACKAGE_STRONG_NAME_VERIFICATION.md'
      - 'docs/PACKAGE_VM_QUALIFICATION_PROFILES.md'
      - 'docs/PACKAGE_VM_EXECUTION.md'
      - 'Tests/survey/test_package_static_analysis_contracts.py'
      - 'Tests/survey/test_package_semantic_analysis_contracts.py'
      - 'Tests/survey/Test-PackageTrustVerificationContracts.ps1'
      - 'Tests/survey/test_package_strong_name_verification_contracts.py'
      - 'Tests/survey/test_package_vm_qualification_profile_contracts.py'
      - 'Tests/survey/test_package_vm_execution_contracts.py'
      - 'tests/survey/run_offline_survey_tests.sh'
      - '.github/workflows/package-static-analysis.yml'
  push:
    branches: [main, 'feat/**', 'repair/**', 'test/**']
    paths:
      - '.claude/skills/package-static-analysis/**'
      - '.claude/skills/package-vm-execution/**'
      - '.claude/capabilities/package-*.md'
      - 'harness/api/package-static-analysis-skill.json'
      - 'harness/api/package-semantic-analysis-skill.json'
      - 'harness/api/package-trust-verification-skill.json'
      - 'harness/api/package-strong-name-verification-skill.json'
      - 'harness/api/package-vm-qualification-skill.json'
      - 'harness/api/package-vm-execution-skill.json'
      - 'harness/api/package-vm-execution-routing.json'
      - 'harness/api/agent-capability-manifest.json'
      - 'harness/api/agent-routing-manifest.json'
      - 'harness/api/sas-harness-api.json'
      - 'harness/workflows/package-analysis.yaml'
      - 'harness/workflows/package-vm-execution.yaml'
      - 'schemas/harness/package-static-analysis-result.schema.json'
      - 'schemas/harness/package-semantic-analysis-result.schema.json'
      - 'schemas/harness/package-trust-policy.schema.json'
      - 'schemas/harness/package-trust-verification-result.schema.json'
      - 'schemas/harness/package-strong-name-verification-result.schema.json'
      - 'schemas/harness/package-vm-qualification-profile.schema.json'
      - 'schemas/harness/package-vm-execution-result.schema.json'
      - 'Tests/Fixtures/package-vm-qualification/**'
      - 'Tests/Fixtures/package-vm-execution/**'
      - 'tools/package-analysis/**'
      - 'scripts/Invoke-SasPackageStaticAnalysis.ps1'
      - 'scripts/Invoke-SasPackageSemanticAnalysis.ps1'
      - 'scripts/Invoke-SasPackageTrust.ps1'
      - 'scripts/Invoke-SasPackageStrongNameVerification.ps1'
      - 'scripts/Invoke-SasPackageDisposableVmRun.ps1'
      - 'scripts/invoke-sas-package-static-analysis.sh'
      - 'scripts/invoke-sas-package-semantic-analysis.sh'
      - 'scripts/invoke-sas-package-strong-name-verification.sh'
      - 'docs/PACKAGE_STATIC_ANALYSIS.md'
      - 'docs/PACKAGE_SEMANTIC_ANALYSIS.md'
      - 'docs/PACKAGE_TRUST_VERIFICATION.md'
      - 'docs/PACKAGE_STRONG_NAME_VERIFICATION.md'
      - 'docs/PACKAGE_VM_QUALIFICATION_PROFILES.md'
      - 'docs/PACKAGE_VM_EXECUTION.md'
      - 'Tests/survey/test_package_static_analysis_contracts.py'
      - 'Tests/survey/test_package_semantic_analysis_contracts.py'
      - 'Tests/survey/Test-PackageTrustVerificationContracts.ps1'
      - 'Tests/survey/test_package_strong_name_verification_contracts.py'
      - 'Tests/survey/test_package_vm_qualification_profile_contracts.py'
      - 'Tests/survey/test_package_vm_execution_contracts.py'
      - 'tests/survey/run_offline_survey_tests.sh'
      - '.github/workflows/package-static-analysis.yml'

jobs:
  contracts:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile package analyzers and contracts
        run: >-
          python -m py_compile
          tools/package-analysis/analyze_package.py
          tools/package-analysis/enrich_package_semantics.py
          tools/package-analysis/verify_dotnet_strong_name.py
          tools/package-analysis/validate_vm_qualification_profile.py
          Tests/survey/test_package_static_analysis_contracts.py
          Tests/survey/test_package_semantic_analysis_contracts.py
          Tests/survey/test_package_strong_name_verification_contracts.py
          Tests/survey/test_package_vm_qualification_profile_contracts.py
          Tests/survey/test_package_vm_execution_contracts.py
      - name: Execute static package contracts
        run: python Tests/survey/test_package_static_analysis_contracts.py
      - name: Execute semantic package contracts
        run: python Tests/survey/test_package_semantic_analysis_contracts.py
      - name: Execute strong-name verification contracts
        run: python Tests/survey/test_package_strong_name_verification_contracts.py
      - name: Execute VM qualification profile contracts
        env:
          SAS_VM_QUALIFICATION_DIAGNOSTIC: ${{ runner.temp }}/package-vm-qualification-contract.log
        run: python Tests/survey/test_package_vm_qualification_profile_contracts.py
      - name: Execute disposable VM runtime contracts
        run: python Tests/survey/test_package_vm_execution_contracts.py
      - name: Upload VM qualification diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-vm-qualification-contract-diagnostics-${{ runner.os }}
          path: ${{ runner.temp }}/package-vm-qualification-contract.log
          if-no-files-found: error
          retention-days: 7
      - name: Execute package trust contracts
        id: package-trust
        if: runner.os == 'Windows'
        timeout-minutes: 10
        shell: pwsh
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP 'package-trust-contract.log'
          Set-Content -LiteralPath $logPath -Value "package-trust-contract start $(Get-Date -Format o)" -Encoding utf8
          & pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File .\Tests\survey\Test-PackageTrustVerificationContracts.ps1 *>&1 |
            ForEach-Object {
              $line = [string]$_
              Add-Content -LiteralPath $logPath -Value $line -Encoding utf8
              $line
            }
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) { exit $exitCode }
      - name: Upload package trust diagnostics
        if: always() && runner.os == 'Windows' && steps.package-trust.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: package-trust-contract-diagnostics
          path: ${{ runner.temp }}/package-trust-contract.log
          if-no-files-found: error
          retention-days: 7
      - name: Validate result and profile schema posture
        run: >-
          python -c 'import json,pathlib; paths=["schemas/harness/package-static-analysis-result.schema.json","schemas/harness/package-semantic-analysis-result.schema.json","schemas/harness/package-trust-policy.schema.json","schemas/harness/package-trust-verification-result.schema.json","schemas/harness/package-strong-name-verification-result.schema.json","schemas/harness/package-vm-qualification-profile.schema.json","schemas/harness/package-vm-execution-result.schema.json"]; schemas=[json.loads(pathlib.Path(p).read_text()) for p in paths]; assert all(s.get(chr(36)+"schema") == "https://json-schema.org/draft/2020-12/schema" and s["additionalProperties"] is False for s in schemas); print("PASS: package schema posture")'
      - name: Bash syntax
        if: runner.os != 'Windows'
        run: |
          bash -n scripts/invoke-sas-package-static-analysis.sh
          bash -n scripts/invoke-sas-package-semantic-analysis.sh
          bash -n scripts/invoke-sas-package-strong-name-verification.sh
      - name: PowerShell parser
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach($path in '.\scripts\Invoke-SasPackageStaticAnalysis.ps1','.\scripts\Invoke-SasPackageSemanticAnalysis.ps1','.\scripts\Invoke-SasPackageTrust.ps1','.\scripts\Invoke-SasPackageStrongNameVerification.ps1','.\scripts\Invoke-SasPackageDisposableVmRun.ps1','.\Tests\survey\Test-PackageTrustVerificationContracts.ps1') {
            $tokens=$null; $errors=$null
            [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $path),[ref]$tokens,[ref]$errors)
            if($errors.Count -gt 0){$errors|ForEach-Object{Write-Error $_}; exit 1}
          }
          'PASS: PowerShell parsers'
