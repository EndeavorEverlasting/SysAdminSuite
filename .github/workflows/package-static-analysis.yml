name: Package static analysis contracts

permissions:
  contents: read

on:
  pull_request:
    paths:
      - '.claude/skills/package-static-analysis/**'
      - 'harness/api/package-static-analysis-skill.json'
      - 'schemas/harness/package-static-analysis-result.schema.json'
      - 'tools/package-analysis/**'
      - 'scripts/Invoke-SasPackageStaticAnalysis.ps1'
      - 'scripts/invoke-sas-package-static-analysis.sh'
      - 'docs/PACKAGE_STATIC_ANALYSIS.md'
      - 'Tests/survey/test_package_static_analysis_contracts.py'
      - '.github/workflows/package-static-analysis.yml'
  push:
    branches: [main, 'feat/**', 'repair/**', 'test/**']
    paths:
      - '.claude/skills/package-static-analysis/**'
      - 'harness/api/package-static-analysis-skill.json'
      - 'schemas/harness/package-static-analysis-result.schema.json'
      - 'tools/package-analysis/**'
      - 'scripts/Invoke-SasPackageStaticAnalysis.ps1'
      - 'scripts/invoke-sas-package-static-analysis.sh'
      - 'docs/PACKAGE_STATIC_ANALYSIS.md'
      - 'Tests/survey/test_package_static_analysis_contracts.py'
      - '.github/workflows/package-static-analysis.yml'

jobs:
  contracts:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile analyzer and executable contracts
        run: |
          python -m py_compile tools/package-analysis/analyze_package.py Tests/survey/test_package_static_analysis_contracts.py
          python Tests/survey/test_package_static_analysis_contracts.py
      - name: Validate result schema posture
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          schema=json.loads(Path('schemas/harness/package-static-analysis-result.schema.json').read_text())
          assert schema['$schema']=='https://json-schema.org/draft/2020-12/schema'
          assert schema['additionalProperties'] is False
          print('PASS: result schema posture')
          PY
      - name: Bash syntax
        if: runner.os != 'Windows'
        run: bash -n scripts/invoke-sas-package-static-analysis.sh
      - name: PowerShell parser
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokens=$null; $errors=$null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path '.\scripts\Invoke-SasPackageStaticAnalysis.ps1'),
            [ref]$tokens,
            [ref]$errors
          )
          if($errors.Count -gt 0){$errors|ForEach-Object{Write-Error $_}; exit 1}
          'PASS: PowerShell parser'
