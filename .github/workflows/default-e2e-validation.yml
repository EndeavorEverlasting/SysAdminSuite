name: Default End-to-End Validation

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'CODEBASE_MAP.md'
      - 'START-HERE-SysAdminSuite.md'
      - 'Inspect-LatestSoftwareInstall.cmd'
      - 'Inspect-LatestValidatedSoftwareDeployment.cmd'
      - '.claude/skills/**'
      - '.claude/capabilities/**'
      - 'docs/END_TO_END_TESTING_POSTURE.md'
      - 'docs/SOFTWARE_INSTALL_E2E.md'
      - 'docs/SOFTWARE_INSTALL_HARNESS.md'
      - 'docs/SOFTWARE_INSTALL_RESULT_INSPECTION.md'
      - 'docs/SOFTWARE_INSTALL_VALIDATED_FINALIZATION.md'
      - 'docs/examples/validated-deployment-request.example.json'
      - 'docs/AI_LAYER.md'
      - 'docs/launch-and-doc-index.md'
      - 'docs/tutorials/SOFTWARE_DEPLOYMENT_DRY_RUN_AND_PILOT.md'
      - 'harness/e2e/**'
      - 'harness/api/agent-capability-manifest.json'
      - 'harness/api/sas-harness-api.json'
      - 'schemas/harness/**'
      - 'scripts/Invoke-SasEndToEndValidation.ps1'
      - 'scripts/Invoke-SasSoftwareInstall.ps1'
      - 'scripts/Invoke-SasSoftwareInstallE2E.ps1'
      - 'scripts/Invoke-SasValidatedSoftwareDeployment.ps1'
      - 'scripts/Invoke-SasSoftwareInstallFinalization.ps1'
      - 'scripts/Invoke-SasValidatedSoftwareDeploymentE2E.ps1'
      - 'scripts/SasSoftwareInstallFinalization.psm1'
      - 'scripts/Show-SasSoftwareInstallResult.ps1'
      - 'scripts/Show-SasValidatedSoftwareDeploymentResult.ps1'
      - 'scripts/Build-SasSoftwareInstallFixtureExecutable.ps1'
      - 'scripts/SasTargetIntake.psm1'
      - 'scripts/validate-sysadmin-harness.ps1'
      - 'scripts/SasRunContext.psm1'
      - 'scripts/Render-SasEnglishReport.ps1'
      - 'scripts/Invoke-SasHarnessContracts.ps1'
      - 'dashboard/**'
      - 'Tests/fixtures/software-install/**'
      - 'Tests/Pester/SoftwareInstallHarness.Tests.ps1'
      - 'Tests/survey/test_software_install_harness_contracts.py'
      - 'Tests/survey/test_software_install_result_inspector_contracts.py'
      - 'Tests/survey/test_software_install_finalization_contracts.py'
      - 'Tests/survey/test_e2e_default_posture_contracts.py'
      - 'Tests/survey/test_software_deployment_tutorial_contracts.py'
      - 'Tests/survey/test_one_command_harness_proof_contracts.py'
      - 'Tests/survey/test_run_context_contracts.py'
      - 'Tests/survey/test_local_harness_contracts.py'
      - 'survey/fixtures/english-log/**'
      - 'survey/workflows/**'
      - 'mcp/local/servers.json'
      - '.githooks/**'
      - '.github/workflows/default-e2e-validation.yml'
  push:
    branches:
      - main
      - 'feat/**'
      - 'refactor/**'
      - 'harness/**'
    paths:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'CODEBASE_MAP.md'
      - 'START-HERE-SysAdminSuite.md'
      - 'Inspect-LatestSoftwareInstall.cmd'
      - 'Inspect-LatestValidatedSoftwareDeployment.cmd'
      - '.claude/skills/**'
      - '.claude/capabilities/**'
      - 'docs/END_TO_END_TESTING_POSTURE.md'
      - 'docs/SOFTWARE_INSTALL_E2E.md'
      - 'docs/SOFTWARE_INSTALL_HARNESS.md'
      - 'docs/SOFTWARE_INSTALL_RESULT_INSPECTION.md'
      - 'docs/SOFTWARE_INSTALL_VALIDATED_FINALIZATION.md'
      - 'docs/examples/validated-deployment-request.example.json'
      - 'docs/AI_LAYER.md'
      - 'docs/launch-and-doc-index.md'
      - 'docs/tutorials/SOFTWARE_DEPLOYMENT_DRY_RUN_AND_PILOT.md'
      - 'harness/e2e/**'
      - 'harness/api/agent-capability-manifest.json'
      - 'harness/api/sas-harness-api.json'
      - 'schemas/harness/**'
      - 'scripts/Invoke-SasEndToEndValidation.ps1'
      - 'scripts/Invoke-SasSoftwareInstall.ps1'
      - 'scripts/Invoke-SasSoftwareInstallE2E.ps1'
      - 'scripts/Invoke-SasValidatedSoftwareDeployment.ps1'
      - 'scripts/Invoke-SasSoftwareInstallFinalization.ps1'
      - 'scripts/Invoke-SasValidatedSoftwareDeploymentE2E.ps1'
      - 'scripts/SasSoftwareInstallFinalization.psm1'
      - 'scripts/Show-SasSoftwareInstallResult.ps1'
      - 'scripts/Show-SasValidatedSoftwareDeploymentResult.ps1'
      - 'scripts/Build-SasSoftwareInstallFixtureExecutable.ps1'
      - 'scripts/SasTargetIntake.psm1'
      - 'scripts/validate-sysadmin-harness.ps1'
      - 'scripts/SasRunContext.psm1'
      - 'scripts/Render-SasEnglishReport.ps1'
      - 'scripts/Invoke-SasHarnessContracts.ps1'
      - 'dashboard/**'
      - 'Tests/fixtures/software-install/**'
      - 'Tests/Pester/SoftwareInstallHarness.Tests.ps1'
      - 'Tests/survey/test_software_install_harness_contracts.py'
      - 'Tests/survey/test_software_install_result_inspector_contracts.py'
      - 'Tests/survey/test_software_install_finalization_contracts.py'
      - 'Tests/survey/test_e2e_default_posture_contracts.py'
      - 'Tests/survey/test_software_deployment_tutorial_contracts.py'
      - 'Tests/survey/test_one_command_harness_proof_contracts.py'
      - 'Tests/survey/test_run_context_contracts.py'
      - 'Tests/survey/test_local_harness_contracts.py'
      - 'survey/fixtures/english-log/**'
      - 'survey/workflows/**'
      - 'mcp/local/servers.json'
      - '.githooks/**'
      - '.github/workflows/default-e2e-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  default-e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install fixture-safe E2E dependencies
        shell: pwsh
        run: |
          pip install websockets jsonschema
          npm install --no-save --no-package-lock ws@8
      - name: Validate E2E posture, tutorial, and software-install contracts
        shell: pwsh
        run: |
          python .\Tests\survey\test_software_install_harness_contracts.py
          python .\Tests\survey\test_software_install_result_inspector_contracts.py
          python .\Tests\survey\test_software_install_finalization_contracts.py
          python .\Tests\survey\test_e2e_default_posture_contracts.py
          python .\Tests\survey\test_software_deployment_tutorial_contracts.py
      - name: Parse validated deployment PowerShell surfaces
        shell: pwsh
        run: |
          $paths = @(
            '.\scripts\SasSoftwareInstallFinalization.psm1',
            '.\scripts\Invoke-SasSoftwareInstallFinalization.ps1',
            '.\scripts\Invoke-SasValidatedSoftwareDeployment.ps1',
            '.\scripts\Invoke-SasValidatedSoftwareDeploymentE2E.ps1',
            '.\scripts\Show-SasValidatedSoftwareDeploymentResult.ps1'
          )
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $path), [ref]$tokens, [ref]$errors)
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "${path}: $($_.Message)" }
              throw "$path reported $($errors.Count) parser error(s)."
            }
          }
          Write-Host 'PASS: validated deployment PowerShell parser checks.'
      - name: Run default end-to-end gate
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\Invoke-SasEndToEndValidation.ps1 `
            -Profile default `
            -OutputRoot .\survey\output\e2e-validation
      - name: Upload E2E proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: default-e2e-validation
          path: |
            survey/output/e2e-validation/**/e2e_validation_matrix.txt
            survey/output/e2e-validation/**/e2e_validation_result.json
            survey/output/e2e-validation/**/*.log
            survey/output/e2e-validation/**/harness-one-command-synthetic/**
            survey/output/e2e-validation/**/software-install-fixture/**
            survey/output/e2e-validation/**/software-install-validated-finalization/**
          if-no-files-found: error
