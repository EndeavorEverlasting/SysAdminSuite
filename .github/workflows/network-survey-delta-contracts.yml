name: Network Survey Delta Contracts

on:
  pull_request:
    paths:
      - 'Run-NetworkSurveyDelta.cmd'
      - 'scripts/Start-SasNetworkSurveyDelta.ps1'
      - 'scripts/SasDeltaEvidenceCache.psm1'
      - 'scripts/Invoke-SasDeltaPreflightPlanRows.ps1'
      - 'scripts/Write-SasDeltaPreflightArtifacts.ps1'
      - 'survey/sas-delta-preflight-plan.ps1'
      - 'survey/fixtures/delta_preflight_*.sample.csv'
      - 'Tests/survey/test_network_survey_delta_contracts.py'
      - 'docs/NETWORK_SURVEY_DELTA_LAUNCHER.md'
      - '.github/workflows/network-survey-delta-contracts.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false
          persist-credentials: false

      - name: Run static contracts
        shell: pwsh
        run: python .\Tests\survey\test_network_survey_delta_contracts.py

      - name: Parse PowerShell surfaces
        shell: pwsh
        run: |
          $paths = @(
            '.\scripts\SasDeltaEvidenceCache.psm1',
            '.\survey\sas-delta-preflight-plan.ps1',
            '.\scripts\Invoke-SasDeltaPreflightPlanRows.ps1',
            '.\scripts\Write-SasDeltaPreflightArtifacts.ps1',
            '.\scripts\Start-SasNetworkSurveyDelta.ps1'
          )
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $path),
              [ref]$tokens,
              [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "${path}: $($_.Message)" }
              throw "$path reported $($errors.Count) parser error(s)."
            }
          }
          Write-Host 'PASS: PowerShell parser accepted planner, module, and launcher.'

      - name: Run synthetic smart-delta fixture
        shell: pwsh
        run: |
          $outputRoot = Join-Path $PWD 'survey\output\delta_preflight'
          $stagingRoot = Join-Path $PWD 'survey\input\delta_preflight'
          $result = .\survey\sas-delta-preflight-plan.ps1 `
            -InputFile .\survey\fixtures\delta_preflight_requested.sample.csv `
            -EvidenceFile @(
              '.\survey\fixtures\delta_preflight_evidence_previous.sample.csv',
              '.\survey\fixtures\delta_preflight_evidence_latest.sample.csv'
            ) `
            -ReferenceTime '2026-07-14T12:00:00-04:00' `
            -RunId 'fixture-smart-delta' `
            -OutputRoot $outputRoot `
            -StagingRoot $stagingRoot `
            -AllowFixtures

          if ($result.network_activity_performed -ne $false) { throw 'Planner reported network activity.' }
          if ($result.target_mutation_performed -ne $false) { throw 'Planner reported target mutation.' }
          if ($result.probe_required_count -ne 1) { throw "Expected one stale target; found $($result.probe_required_count)." }
          if ($result.review_required_count -ne 1) { throw "Expected one serial-only review row; found $($result.review_required_count)." }
          if ($result.became_silent_count -ne 1) { throw "Expected one BECAME_SILENT delta; found $($result.became_silent_count)." }

          $targets = @(Get-Content -LiteralPath $result.to_probe_targets_path | Where-Object { $_.Trim() })
          if ($targets.Count -ne 1 -or $targets[0] -ne 'CYB004') {
            throw "Expected only CYB004 in smart staged targets; found: $($targets -join ',')"
          }
          Write-Host 'PASS: smart delta reused fresh evidence and staged only the stale target.'

      - name: Run synthetic time-diverse repeat fixture
        shell: pwsh
        run: |
          $result = .\survey\sas-delta-preflight-plan.ps1 `
            -InputFile .\survey\fixtures\delta_preflight_requested.sample.csv `
            -EvidenceFile @(
              '.\survey\fixtures\delta_preflight_evidence_previous.sample.csv',
              '.\survey\fixtures\delta_preflight_evidence_latest.sample.csv'
            ) `
            -ReferenceTime '2026-07-14T18:30:00-04:00' `
            -RunId 'fixture-forced-repeat' `
            -ForceReprobe `
            -ForceReason 'synthetic_time_diverse_repeat' `
            -AllowFixtures

          $targets = @(Get-Content -LiteralPath $result.to_probe_targets_path | Where-Object { $_.Trim() })
          if ($targets.Count -ne 4) { throw "Expected four probe-ready forced targets; found $($targets.Count)." }
          if ($targets -contains 'SN1003') { throw 'Serial-only value was incorrectly staged as a target.' }
          if ($result.review_required_count -ne 1) { throw 'Serial-only row must remain review-required during a forced repeat.' }
          Write-Host 'PASS: explicit time-diverse repeat staged probe-ready rows without staging the mystery serial.'

      - name: Run stateful launcher plan-only fixture
        shell: pwsh
        run: |
          .\scripts\Start-SasNetworkSurveyDelta.ps1 `
            -Action Plan `
            -InputFile .\survey\fixtures\delta_preflight_requested.sample.csv `
            -EvidenceFile @(
              '.\survey\fixtures\delta_preflight_evidence_previous.sample.csv',
              '.\survey\fixtures\delta_preflight_evidence_latest.sample.csv'
            ) `
            -ReferenceTime '2026-07-14T12:00:00-04:00' `
            -AllowFixtures `
            -NonInteractive `
            -NoOpen

          $statePath = Join-Path $PWD 'survey\output\network_survey_delta\operator-state.json'
          $state = Get-Content -LiteralPath $statePath -Raw | ConvertFrom-Json
          if (-not $state.input_file_relative) { throw 'Launcher did not remember the approved requested population.' }
          if (-not $state.last_observation_delta_relative) { throw 'Launcher did not remember the latest observation delta.' }
          if ($state.attempt_count -ne 0) { throw 'Plan-only action incorrectly advanced the network attempt count.' }
          Write-Host 'PASS: launcher plan-only action persisted reusable local state without network activity.'

      - name: Verify CMD launcher rejects arguments
        shell: pwsh
        run: |
          $process = Start-Process `
            -FilePath 'cmd.exe' `
            -ArgumentList @('/d', '/c', 'Run-NetworkSurveyDelta.cmd forbidden') `
            -Wait `
            -PassThru `
            -NoNewWindow
          if ($process.ExitCode -ne 2) { throw "Expected usage exit 2; found $($process.ExitCode)." }
          Write-Host 'PASS: zero-argument double-click launcher rejects command-line arguments.'

      - name: Upload synthetic fixture evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: network-survey-delta-synthetic-evidence
          path: |
            survey/output/delta_preflight/
            survey/output/network_survey_delta/
            survey/input/delta_preflight/
          if-no-files-found: error
