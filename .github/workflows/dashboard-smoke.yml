name: Dashboard Smoke

on:
  pull_request:
    paths:
      - 'dashboard/**'
      - 'Tests/bash/test_dashboard_*.sh'
      - 'Tests/bash/test_update_flow_contracts.sh'
      - 'Tests/bash/test_field_tech_update_contracts.sh'
      - 'Tests/bash/test_powershell_network_preflight_contracts.sh'
      - 'START-HERE-SysAdminSuite.md'
      - 'START-HERE-CYBERNET-NEURON-SURVEY.md'
      - 'START-HERE-SysAdminSuite-Dashboard.bat'
      - 'START-HERE-SysAdminSuite-Dashboard.cmd'
      - 'SysAdminSuite Dashboard.cmd'
      - 'Launch-SysAdminSuiteDashboard.Host.bat'
      - 'Update-SysAdminSuite.ps1'
      - 'Update-SysAdminSuite.bat'
      - 'survey/sas-network-preflight.ps1'
      - 'tools/update/**'
      - 'docs/APPROVED_UPDATE_FLOW.md'
      - 'docs/DASHBOARD_ENTRYPOINT.md'
      - 'docs/FIELD_TECH_UPDATE.md'
      - 'docs/FIELD_NETWORK_PREFLIGHT.md'
      - '.github/workflows/dashboard-smoke.yml'
  push:
    branches:
      - main
    paths:
      - 'dashboard/**'
      - 'Tests/bash/test_dashboard_*.sh'
      - 'Tests/bash/test_update_flow_contracts.sh'
      - 'Tests/bash/test_field_tech_update_contracts.sh'
      - 'Tests/bash/test_powershell_network_preflight_contracts.sh'
      - 'START-HERE-SysAdminSuite.md'
      - 'START-HERE-CYBERNET-NEURON-SURVEY.md'
      - 'START-HERE-SysAdminSuite-Dashboard.bat'
      - 'START-HERE-SysAdminSuite-Dashboard.cmd'
      - 'SysAdminSuite Dashboard.cmd'
      - 'Launch-SysAdminSuiteDashboard.Host.bat'
      - 'Update-SysAdminSuite.ps1'
      - 'Update-SysAdminSuite.bat'
      - 'survey/sas-network-preflight.ps1'
      - 'tools/update/**'
      - 'docs/APPROVED_UPDATE_FLOW.md'
      - 'docs/DASHBOARD_ENTRYPOINT.md'
      - 'docs/FIELD_TECH_UPDATE.md'
      - 'docs/FIELD_NETWORK_PREFLIGHT.md'
      - '.github/workflows/dashboard-smoke.yml'

jobs:
  dashboard-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install relay test dependency
        run: pip install websockets
      - name: JavaScript syntax checks
        run: |
          node --check dashboard/js/parsers.js
          node --check dashboard/js/run-control.js
          node --check dashboard/js/app.js
          node --check dashboard/js/bundle.js
          node --check dashboard/js/cybernet-os-preflight.js
          node --check dashboard/js/launch-cybernet-tutorial.js
          node --check dashboard/js/launch-repo-setup-tutorial.js
          node --check dashboard/js/repo-setup-tutorial.js
          node --check dashboard/test_run_control_lifecycle.js
          node --check dashboard/test_relay_abort_e2e.js
      - name: Relay syntax check
        run: python -m py_compile dashboard/relay.py
      - name: Dashboard parser smoke test
        run: node dashboard/smoke-test.js
      - name: Dashboard Start-button runtime smoke test
        run: node dashboard/start-button-smoke.js
      - name: Relay cancel client smoke test
        run: node dashboard/probe-stop-smoke.js
      - name: Run Control lifecycle smoke test
        run: node dashboard/test_run_control_lifecycle.js
      - name: Relay cancel unit test
        run: python dashboard/test_relay_cancel.py
      - name: Relay cancel loopback E2E test
        run: python dashboard/test_relay_cancel_e2e.py
      - name: Relay abort loopback E2E test
        run: |
          npm install --no-save --no-package-lock ws@8
          node dashboard/test_relay_abort_e2e.js
      - name: Dashboard tutorial launcher contracts
        run: bash Tests/bash/test_dashboard_tutorial_launcher_contracts.sh
      - name: Dashboard entrypoint contracts
        run: bash Tests/bash/test_dashboard_entrypoint_contracts.sh
      - name: Dashboard wizard exit + probe stop contracts
        run: bash Tests/bash/test_dashboard_wizard_exit_contracts.sh
      - name: Dashboard relay cancel E2E contracts
        run: bash Tests/bash/test_dashboard_relay_cancel_e2e_contracts.sh
      - name: Dashboard relay abort E2E contracts
        run: bash Tests/bash/test_dashboard_relay_abort_e2e_contracts.sh
      - name: Approved update flow contracts
        run: bash Tests/bash/test_update_flow_contracts.sh
      - name: Field tech update contracts
        run: bash Tests/bash/test_field_tech_update_contracts.sh
      - name: PowerShell network preflight contracts
        run: bash Tests/bash/test_powershell_network_preflight_contracts.sh
