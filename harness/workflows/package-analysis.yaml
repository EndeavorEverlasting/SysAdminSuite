name: package-analysis
description: Route local package intake through static inventory, semantic enrichment, offline trust, and disposable-VM qualification validation without executing package code.
mode: local_read
network_activity: false
target_mutation: false
inputs:
  - operator-local package path
  - ignored local output root
  - optional offline wheelhouse
  - optional reviewed trust policy
  - optional package VM qualification profile
input_mapping:
  operator_local_package_path: InputPath supplied to the selected package entrypoint
  static_result: package_analysis.json produced by package_analysis.static
  semantic_result: package_semantic_analysis.json produced by package_analysis.semantic_enrich
  trust_policy: TrustPolicyPath for package_analysis.trust deployment gate
  trust_result: package_trust_verification.json produced by package_analysis.trust
  qualification_profile: operator-local package VM qualification profile for package_analysis.vm_qualification_profile_validate
phases:
  - id: create-run-context
    action: Create or reuse the canonical SasRunContext under an ignored package-analysis run root and register expected artifacts.
  - id: static-inventory
    action: Run scripts/Invoke-SasPackageStaticAnalysis.ps1 or scripts/invoke-sas-package-static-analysis.sh.
  - id: semantic-enrichment
    action: Run scripts/Invoke-SasPackageSemanticAnalysis.ps1 or scripts/invoke-sas-package-semantic-analysis.sh against the static result.
  - id: offline-trust
    action: On Windows, run scripts/Invoke-SasPackageTrust.ps1 in observation mode, then apply a reviewed local policy when available.
  - id: vm-qualification
    action: Validate the package-specific profile with tools/package-analysis/validate_vm_qualification_profile.py without starting a VM.
  - id: register-artifacts
    action: Register JSON/TXT results and summary outputs in sas-artifact-registry/v1.
guardrails:
  - Local_ignored_package_source_only
  - No_package_execution
  - No_shortcut_following
  - No_archive_payload_extraction_by_default
  - No_online_revocation_by_default
  - No_vm_start_from_validator
  - No_autologon
  - Reuse_canonical_SasRunContext
  - Equal_priority_route_conflicts_fail_closed
artifacts:
  - package_analysis.json
  - package_analysis.txt
  - package_semantic_analysis.json
  - package_semantic_analysis.txt
  - package_trust_verification.json
  - package_trust_verification.txt
  - package_trust_policy.starter.json
  - package_vm_qualification validation result
  - artifact_registry.json
  - operator_handoff.txt
validation:
  - python3 Tests/survey/test_package_static_analysis_contracts.py
  - python3 Tests/survey/test_package_semantic_analysis_contracts.py
  - python3 Tests/survey/test_package_vm_qualification_profile_contracts.py
  - pwsh -NoProfile -File Tests/survey/Test-PackageTrustVerificationContracts.ps1
  - python3 Tests/survey/test_agent_routing_manifest_contracts.py
  - python3 Tests/survey/test_agent_capability_manifest_contracts.py
next_actions:
  - Keep private package evidence under ignored run roots.
  - Enter disposable-VM runtime only after a READY_FOR_VM qualification profile and explicit authorization.
